<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Relevais" />
<title>Relevais Health — Patient Onboarding Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary:#0c3b6e;
    --primary-light:#6497cd;
    --primary-50:#e3f1ff;
    --primary-foreground:#fafaf9;
    --foreground:#1c1917;
    --foreground-muted:#79716b;
    --neutral-foreground:#44403b;
    --neutral:#f5f5f4;
    --neutral-200:#e7e5e4;
    --border:#d6d3d1;
    --input-border:#d6d3d1;
    --background:#ffffff;
    --surface:rgba(250,250,249,0.6);
    --page-bg:#fafaf9;
    --select-blue:#e9f2fc;
    --success:#6ba539;
    --warning-bg:#fbf2d6;
    --warning-fg:#8a6a18;
    --error-bg:#fbe6e6;
    --error-fg:#b42318;
    --primary-lightest:#bbdcff;
    --warning-100:#faf2cb;
    --warning-700:#a95714;
    --warning-50:#fefbec;
    --warning-200:#f7e8a4;
    --success-50:#f1f9ec;
    --success-200:#cae7b9;
    --success-700:#386427;
    --success-900:#2b4522;
    --serif:'Source Serif 4', Georgia, serif;
    --sans:'Instrument Sans', -apple-system, system-ui, sans-serif;
    --statusbar-h:54px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    overscroll-behavior:none;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
  }
  body{
    font-family:var(--sans);
    background:
      radial-gradient(1200px 600px at 50% -10%, #eef4fb 0%, rgba(238,244,251,0) 60%),
      #eceef1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 16px 60px;
    color:var(--foreground);
  }

  .stage-caption{
    font-family:var(--sans);
    color:#6b7280;
    font-size:13px;
    letter-spacing:.02em;
    margin-bottom:22px;
    text-align:center;
  }
  .stage-caption b{color:#374151;font-weight:600;}

  /* ---------- Prototype section nav (desktop only, fixed top-left) ---------- */
  .proto-nav{
    position:fixed;top:16px;left:16px;z-index:50;
    display:flex;flex-direction:column;gap:3px;
    background:#fff;border:1px solid #e3e6ea;border-radius:12px;padding:5px;
    box-shadow:0 6px 18px -6px rgba(15,40,75,.18);
  }
  .proto-nav button{
    border:none;background:transparent;cursor:pointer;text-align:left;
    font-family:var(--sans);font-weight:600;font-size:12px;color:#5b6573;
    padding:6px 10px;border-radius:8px;white-space:nowrap;
    transition:background .12s, color .12s;
  }
  .proto-nav button:hover:not(:disabled){background:#f1f4f8;color:#374151;}
  .proto-nav button.active{background:var(--primary);color:#fff;}
  .proto-nav button:disabled{opacity:.4;cursor:not-allowed;}

  /* ---------- Phone shell ---------- */
  .phone{
    position:relative;
    width:402px;
    height:874px;
    max-height:calc(100vh - 80px);
    border-radius:46px;
    background:#000;
    padding:5px;
    box-shadow:0 40px 90px -30px rgba(15,40,75,.45), 0 12px 30px -12px rgba(0,0,0,.25);
  }
  .phone-screen{
    position:relative;
    width:100%;height:100%;
    border-radius:42px;
    overflow:hidden;
    background:var(--page-bg);
  }
  /* Dynamic Island — desktop frame only (hidden in full-bleed mobile) */
  .phone-screen::before{
    content:"";
    position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:118px;height:34px;border-radius:20px;background:#000;
    z-index:40;pointer-events:none;
  }

  /* ---------- Screen ---------- */
  .screen{
    position:absolute;inset:0;
    display:none;
    background:linear-gradient(180deg, rgba(245,250,255,0) 0%, rgb(245,250,255) 100%), var(--page-bg);
  }
  .screen.active{display:block;}

  .scroll{
    position:absolute;inset:0;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .scroll::-webkit-scrollbar{display:none;}

  .content{
    min-height:100%;
    display:flex;
    flex-direction:column;
  }

  /* ---------- Status bar ---------- */
  .status-bar{
    position:absolute;top:0;left:0;right:0;height:54px;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px 0;
    pointer-events:none;
    background:linear-gradient(180deg, rgba(247,250,253,0.92) 0%, rgba(247,250,253,0.78) 55%, rgba(247,250,253,0) 100%);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .status-bar .time{font-weight:600;font-size:16px;color:#000;letter-spacing:.01em;}
  .status-icons{display:flex;align-items:center;gap:7px;}
  .status-icons svg{display:block;}

  /* ---------- Home indicator ---------- */
  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:140px;height:5px;border-radius:100px;background:#000;z-index:20;
  }

  /* ---------- Browser chrome (web onboarding only) ---------- */
  .browser-bar{
    position:absolute;top:var(--statusbar-h);left:0;right:0;z-index:19;
    height:46px;display:flex;align-items:center;gap:10px;padding:0 14px;
    background:rgba(248,248,250,0.96);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,0,0,0.07);
  }
  .browser-bar .bb-icon{flex:none;display:flex;align-items:center;justify-content:center;color:#0a84ff;}
  .browser-bar .bb-icon svg{width:19px;height:19px;}
  .browser-bar .bb-aa{color:#3c3c43;font-weight:600;font-size:13px;line-height:1;align-items:flex-end;}
  .browser-bar .bb-aa span{font-size:17px;}
  .url-pill{
    flex:1;min-width:0;height:34px;border-radius:11px;background:#e4e4e9;
    display:flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;
  }
  .url-pill .bb-lock{display:flex;color:#6b6b70;}
  .url-pill .bb-lock svg{width:12px;height:12px;}
  .url-pill .url{font-size:15px;font-weight:400;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Unify the status bar with the browser chrome on web screens */
  .screen.web .status-bar{background:rgba(248,248,250,0.97);}
  /* Push page content below status bar + browser bar (with breathing room) */
  .screen.web header.brand{padding-top:calc(var(--statusbar-h) + 76px);}

  /* ---------- Header ---------- */
  header.brand{
    padding:64px 24px 18px;
    display:flex;flex-direction:column;gap:6px;align-items:flex-start;
  }
  .logo{
    font-family:var(--serif);
    font-weight:700;
    font-size:27px;
    line-height:1;
    color:var(--primary);
    letter-spacing:-.01em;
  }
  .tagline{
    font-family:var(--serif);
    font-weight:500;
    font-size:18px;
    line-height:1.2;
    color:var(--primary-light);
    letter-spacing:-.01em;
  }

  /* ---------- Body / surface ---------- */
  .body{flex:1;display:flex;flex-direction:column;padding:0 8px 26px;}
  .surface{
    flex:1;display:flex;flex-direction:column;gap:18px;
    background:var(--surface);
    border-radius:12px;
    padding:6px 8px 14px;
  }
  .page-title{display:flex;flex-direction:column;gap:7px;padding:6px 8px 0;}
  .step-label{font-weight:500;font-size:12px;color:var(--primary-light);letter-spacing:.01em;}
  .title{
    font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.15;
    color:var(--foreground);letter-spacing:-.015em;margin:0;
  }
  .subtitle{
    font-weight:400;font-size:17px;line-height:1.4;color:var(--foreground-muted);margin:0;
  }

  .main{flex:1;display:flex;flex-direction:column;gap:28px;}

  /* ---------- Question card ---------- */
  .qcard{
    background:var(--background);
    border-radius:22px;
    box-shadow:0 4px 15px rgba(38,38,38,.06);
    padding:16px 0 20px;
    display:flex;flex-direction:column;gap:22px;
  }
  .qcard-section{padding:0 16px;display:flex;flex-direction:column;gap:14px;}
  .qcard-divider{height:1px;background:var(--neutral);width:100%;}

  .icon-badge{
    width:32px;height:32px;border-radius:999px;background:var(--primary-50);
    display:flex;align-items:center;justify-content:center;
    color:var(--primary-light);
  }
  .icon-badge svg{width:16px;height:16px;}

  .q-head{display:flex;flex-direction:column;gap:8px;}
  .question{
    font-family:var(--serif);font-weight:500;font-size:20px;line-height:1.2;
    color:var(--neutral-foreground);letter-spacing:-.01em;
  }
  .q-subtle{font-weight:400;font-size:13px;color:var(--foreground-muted);margin-top:-8px;}
  .q-hint{font-weight:400;font-size:13px;color:var(--foreground-muted);}

  /* ---------- Fields / inputs ---------- */
  .field{display:flex;flex-direction:column;gap:5px;}
  .field-label{font-weight:600;font-size:16px;color:var(--neutral-foreground);}

  .input{
    width:100%;height:48px;border:1px solid var(--input-border);border-radius:8px;
    background:var(--background);
    padding:8px 14px 8px 16px;
    font-family:var(--sans);font-weight:500;font-size:14px;color:var(--foreground);
    outline:none;
  }
  .input::placeholder{color:var(--foreground-muted);font-weight:500;}
  .input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(100,151,205,.18);}

  .input-wrap{position:relative;}
  .input-wrap .input{padding-right:42px;}
  .input-wrap .field-icon{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    color:var(--neutral-foreground);pointer-events:none;
  }
  .input-wrap .field-icon svg{width:18px;height:18px;}

  .select-wrap{position:relative;}
  select.input{appearance:none;-webkit-appearance:none;cursor:pointer;padding-right:42px;color:var(--foreground-muted);}
  select.input.has-value{color:var(--foreground);}
  .select-wrap .field-icon{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    color:var(--neutral-foreground);pointer-events:none;
  }
  .select-wrap .field-icon svg{width:18px;height:18px;}

  /* ---------- Options (radio / checkbox) ---------- */
  .opt-group{display:flex;flex-direction:column;gap:10px;}
  .opt-group.segmented{flex-direction:row;gap:12px;}
  .opt-group.segmented .option{flex:1;}

  .option{
    display:flex;align-items:center;gap:11px;
    border:1px solid var(--border);border-radius:10px;
    background:var(--background);
    padding:13px 16px;cursor:pointer;
    transition:background .12s ease, border-color .12s ease;
    user-select:none;
  }
  .option:hover{border-color:#c4c0bc;}
  .option .opt-label{font-weight:400;font-size:16px;color:var(--foreground);line-height:1.3;}
  .option .opt-label strong{font-weight:700;}
  .option.selected{background:var(--select-blue);border-color:var(--primary-light);}

  .radio{
    width:20px;height:20px;border-radius:50%;border:1.5px solid #c4beb8;
    flex:none;position:relative;background:#fff;transition:border-color .12s;
  }
  .option.selected .radio{border-color:var(--primary);border-width:2px;}
  .option.selected .radio::after{
    content:"";position:absolute;inset:0;margin:auto;width:9px;height:9px;border-radius:50%;background:var(--primary);
  }

  .checkbox{
    width:20px;height:20px;border-radius:5px;border:1.5px solid #c4beb8;
    flex:none;position:relative;background:#fff;transition:all .12s;
  }
  .option.selected .checkbox{background:var(--primary);border-color:var(--primary);}
  .option.selected .checkbox::after{
    content:"";position:absolute;left:50%;top:46%;width:5px;height:10px;
    border:solid #fff;border-width:0 2px 2px 0;
    transform:translate(-50%,-50%) rotate(45deg);
  }

  /* ---------- Inline alert ---------- */
  .alert{
    display:flex;align-items:flex-start;gap:9px;
    background:var(--warning-bg);border-radius:10px;padding:12px 14px;
  }
  .alert svg{width:18px;height:18px;color:var(--warning-fg);flex:none;margin-top:1px;}
  .alert-text{font-weight:600;font-size:14px;line-height:1.35;color:var(--warning-fg);}
  /* Red error variant (ineligibility) */
  .alert.error{background:var(--error-bg);}
  .alert.error svg{color:var(--error-fg);}
  .alert.error .alert-text{color:var(--error-fg);}

  /* ---------- Conditional reveal ---------- */
  .conditional{display:none;flex-direction:column;gap:14px;}
  .conditional.open{display:flex;animation:reveal .22s ease;}
  @keyframes reveal{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

  /* ---------- Slider ---------- */
  .slider-wrap{display:flex;flex-direction:column;gap:9px;margin-top:2px;}
  .slider{position:relative;height:30px;}
  .slider input[type=range]{
    position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;z-index:3;
  }
  .slider-track{
    position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);
    background:var(--neutral-200);border-radius:999px;overflow:hidden;
  }
  .slider-fill{height:100%;background:var(--primary);border-radius:999px;width:var(--pct,50%);}
  .slider-thumb{
    position:absolute;top:50%;left:var(--pct,50%);transform:translate(-50%,-50%);
    height:28px;min-width:46px;padding:0 7px;
    background:#fff;border:1px solid var(--border);border-radius:999px;
    box-shadow:0 1px 4px rgba(0,0,0,.14);
    display:flex;align-items:center;justify-content:center;gap:5px;
    font-weight:600;font-size:14px;color:var(--neutral-foreground);z-index:2;
  }
  .slider-thumb .chev{color:#c4beb8;font-size:13px;line-height:1;}
  .slider-labels{display:flex;justify-content:space-between;font-weight:400;font-size:13px;color:var(--foreground-muted);}

  /* ---------- Terms scroll box ---------- */
  .terms-box{
    border:1px solid var(--border);border-radius:14px;background:#fff;
    padding:16px;
  }
  .terms-box h4{font-family:var(--serif);font-weight:600;font-size:16px;margin:0 0 10px;color:var(--neutral-foreground);}
  .terms-box p{font-size:13px;line-height:1.55;color:var(--foreground-muted);margin:0 0 12px;}

  /* ---------- Footer nav (in-flow, sits below each screen's content) ---------- */
  .footer-nav{display:flex;gap:16px;align-items:center;margin-top:6px;}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn-back:disabled:hover{background:var(--primary-foreground);}
  .btn{
    border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;
    border-radius:999px;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:7px;
    transition:filter .12s, background .12s;
  }
  .btn svg{width:16px;height:16px;}
  .btn-back{
    background:var(--primary-foreground);border:1px solid var(--border);color:var(--neutral-foreground);
    width:120px;flex:none;padding:13px 16px;
  }
  .btn-back:hover{background:#f1efed;}
  .btn-next{background:var(--primary);color:var(--primary-foreground);flex:1;}
  .btn-next:hover{filter:brightness(1.08);}
  .btn-full{background:var(--primary);color:var(--primary-foreground);width:100%;}
  .btn-full:hover{filter:brightness(1.08);}

  /* ---------- Confirmation ---------- */
  .confirm{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:18px;padding:24px 16px 0;}
  .success-ring{
    width:96px;height:96px;border-radius:50%;border:4px solid var(--success);
    display:flex;align-items:center;justify-content:center;margin-bottom:6px;
  }
  .success-ring svg{width:46px;height:46px;color:var(--success);}
  .party-icon{margin-bottom:8px;position:relative;}
  .party-icon svg{width:60px;height:60px;color:var(--success);}
  .confirm .title{font-size:36px;}
  .confirm-footer{padding:0 8px;}

  /* ---------- Subtle celebrate (milestone + account-created) ---------- */
  .confetti{position:absolute;top:50%;left:50%;width:7px;height:7px;border-radius:2px;background:var(--c);opacity:0;pointer-events:none;}
  .confirm.celebrating .party-icon{animation:pop-in .6s cubic-bezier(.2,.8,.3,1.5) both;}
  .confirm.celebrating .confetti{animation:confetti-burst .75s ease-out var(--d,0s) both;}
  .confirm.celebrating .success-ring{animation:pop-in .55s cubic-bezier(.2,.8,.3,1.5) both;}
  .confirm.celebrating .success-ring svg{animation:check-pop .4s ease .2s both;}
  @keyframes pop-in{0%{opacity:0;transform:scale(.4) rotate(-10deg);}60%{opacity:1;transform:scale(1.12) rotate(4deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
  @keyframes check-pop{0%{opacity:0;transform:scale(.3);}100%{opacity:1;transform:scale(1);}}
  @keyframes confetti-burst{0%{opacity:0;transform:translate(-50%,-50%) scale(0);}25%{opacity:1;}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1) rotate(160deg);}}

  /* ---------- Splash (native app intro carousel) ---------- */
  .splash{flex:1;display:flex;flex-direction:column;gap:16px;padding:6px 8px 0;}
  .splash-card{
    flex:1;min-height:420px;background:var(--background);border-radius:22px;
    box-shadow:0 4px 15px rgba(38,38,38,.06);
    display:flex;align-items:center;justify-content:center;
    color:var(--foreground-muted);font-size:15px;
  }
  .carousel-dots{display:flex;justify-content:center;gap:8px;padding:2px 0;}
  .carousel-dots .dot{width:8px;height:8px;border-radius:50%;background:var(--neutral-200);}
  .carousel-dots .dot.active{background:var(--primary-light);}

  /* ---------- Native app: leading-icon input ---------- */
  .input-wrap.lead .input{padding-left:42px;}
  .field-icon-lead{left:14px;right:auto;}

  /* ---------- Verification code boxes ---------- */
  .code-boxes{display:flex;gap:8px;}
  .code-box{
    flex:1;width:0;height:52px;border:1px solid var(--input-border);border-radius:10px;background:#fff;
    text-align:center;padding:0;outline:none;-webkit-appearance:none;
    font-family:var(--sans);font-weight:600;font-size:20px;color:var(--foreground);
  }
  .code-box::placeholder{color:var(--border);font-weight:500;}
  .code-box:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(100,151,205,.18);}

  /* ---------- iOS push notification (floating banner overlay) ---------- */
  .ios-notif{
    position:absolute;top:calc(var(--statusbar-h) - 4px);left:10px;right:10px;z-index:30;
    display:flex;align-items:center;gap:10px;
    background:rgba(250,250,252,0.72);
    backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
    border:0.5px solid rgba(0,0,0,0.06);border-radius:20px;padding:11px 13px;
    box-shadow:0 14px 34px -10px rgba(0,0,0,.30);
    animation:notifDrop .5s cubic-bezier(.2,.85,.25,1) both;
    transition:transform .32s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  }
  @keyframes notifDrop{from{opacity:0;transform:translateY(-130%);}to{opacity:1;transform:none;}}
  .ios-notif.gone{transform:translateY(-150%);opacity:0;pointer-events:none;}
  .ios-notif-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(180deg,#5af07a,#1faa3e);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 1px 3px rgba(0,0,0,.18);}
  .ios-notif-icon svg{width:21px;height:21px;}
  .ios-notif-body{flex:1;min-width:0;}
  .ios-notif-top{display:flex;justify-content:space-between;align-items:baseline;}
  .ios-notif-title{font-size:14px;font-weight:700;color:#1c1c1e;}
  .ios-notif-time{font-size:12px;font-weight:500;color:#8a8a8e;flex:none;margin-left:8px;}
  .ios-notif-text{font-size:14px;line-height:1.3;color:#1c1c1e;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ---------- Simulated iOS keyboard (desktop only) ---------- */
  .ios-kb{
    position:absolute;left:0;right:0;bottom:0;z-index:60;
    background:#d1d4db;
    padding:8px 5px calc(10px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:8px;
    transform:translateY(115%);transition:transform .28s cubic-bezier(.2,.85,.25,1);
    user-select:none;
    font-family:-apple-system,BlinkMacSystemFont,var(--sans);
  }
  .ios-kb.up{transform:none;}
  .kb-row{display:flex;gap:6px;justify-content:center;}
  .kb-key{
    flex:1;height:42px;background:#fff;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:400;color:#000;cursor:pointer;
    box-shadow:0 1px 0 rgba(0,0,0,.28);
  }
  .kb-key:active{background:#b4bac6;}
  .kb-key.special{background:#abb1bd;font-size:14px;}
  .kb-key.wide{flex:1.5;}
  .kb-key.space{flex:5;font-size:15px;}
  .kb-key.return{flex:2;background:#abb1bd;font-size:15px;}
  .ios-kb.numeric{padding-left:48px;padding-right:48px;gap:10px;}
  .ios-kb.numeric .kb-key{height:46px;font-size:23px;font-weight:500;}
  .ios-kb.numeric .kb-key.blank{background:transparent;box-shadow:none;cursor:default;}
  @media(max-width:460px){ .ios-kb{display:none!important;} }

  /* ---------- iOS system permission alert (auto-prompt) ---------- */
  .ios-alert-overlay{
    position:absolute;inset:0;z-index:35;
    display:flex;align-items:center;justify-content:center;padding:0 36px;
    background:rgba(18,18,28,0.28);
    opacity:0;visibility:hidden;transition:opacity .25s ease;
  }
  .ios-alert-overlay.show{opacity:1;visibility:visible;}
  .ios-alert{
    width:100%;max-width:272px;background:#fff;border-radius:20px;
    padding:20px 16px 14px;text-align:center;
    box-shadow:0 24px 60px -12px rgba(0,0,0,.45);
    transform:scale(.9);opacity:0;
    transition:transform .26s cubic-bezier(.2,.9,.3,1.25), opacity .2s ease;
  }
  .ios-alert-overlay.show .ios-alert{transform:scale(1);opacity:1;}
  .ios-alert-title{font-family:var(--sans);font-weight:700;font-size:16px;line-height:1.3;color:#1c1c1e;margin-bottom:6px;}
  .ios-alert-body{font-family:var(--sans);font-size:13.5px;line-height:1.4;color:#3c3c43;margin-bottom:16px;}
  .ios-alert-btns{display:flex;gap:10px;}
  .ios-alert-btn{flex:1;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:15px;padding:11px 0;border-radius:18px;}
  .ios-alert-btn.secondary{background:#eef0f3;color:var(--primary);}
  .ios-alert-btn.primary{background:var(--primary);color:#fff;}

  /* ---------- Bottom sheet (smartwatch sync) ---------- */
  .sheet-overlay{
    position:absolute;inset:0;z-index:40;
    display:flex;align-items:flex-end;justify-content:center;
    background:rgba(18,18,28,0.28);
    opacity:0;visibility:hidden;
    transition:opacity .28s ease, visibility 0s linear .3s;   /* on close: stay visible until the slide-down finishes */
  }
  .sheet-overlay.show{opacity:1;visibility:visible;transition:opacity .28s ease, visibility 0s;}
  .sheet{
    width:100%;background:#fff;border-radius:24px 24px 0 0;
    padding:8px 24px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.25,1);
    display:flex;flex-direction:column;
  }
  .sheet-overlay.show .sheet{transform:none;}
  .sheet-grab{width:36px;height:5px;border-radius:99px;background:var(--border);margin:0 auto 4px;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;border-bottom:1px solid var(--neutral);}
  .sheet-title{font-family:var(--sans);font-weight:600;font-size:16px;color:var(--neutral-foreground);}
  .sheet-close{border:none;background:transparent;cursor:pointer;color:var(--foreground-muted);padding:2px;display:flex;}
  .sheet-close svg{width:20px;height:20px;}
  .sheet-body{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;padding:40px 0 32px;}
  .sheet-status{font-family:var(--sans);font-weight:700;font-size:18px;color:var(--neutral-foreground);margin-top:10px;}
  .sheet-sub{font-size:14px;color:var(--foreground-muted);}
  .sheet-spinner{width:40px;height:40px;color:var(--primary-light);display:flex;animation:spin .8s linear infinite;}
  .sheet-spinner svg{width:40px;height:40px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .sheet-check{color:var(--primary-light);display:flex;}
  .sheet-check svg{width:40px;height:40px;}
  .sheet-cancel{width:100%;border:none;cursor:pointer;background:#eef0f3;color:var(--neutral-foreground);font-family:var(--sans);font-weight:600;font-size:16px;padding:14px 0;border-radius:999px;}
  /* Scheduling sheet (left-aligned date picker) */
  .sched-sheet-body{display:flex;flex-direction:column;padding-top:8px;}
  .sched-title{font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-.015em;color:var(--neutral-foreground);margin:0 0 8px;}
  .sheet-chip{display:inline-flex;align-self:flex-start;align-items:center;gap:6px;background:var(--neutral);border-radius:999px;padding:6px 12px 6px 10px;font-size:14px;font-weight:500;color:var(--neutral-foreground);margin-bottom:24px;}
  .sheet-chip svg{width:13px;height:13px;color:var(--neutral-foreground);}
  .sched-divider{height:1px;background:var(--neutral);margin-bottom:24px;}
  .sched-label{font-weight:500;font-size:16px;color:var(--neutral-foreground);}
  .sched-sub{font-weight:400;font-size:14px;line-height:1.55;color:var(--foreground-muted);margin:2px 0 32px;}
  .date-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;}
  .date-opt{width:100%;border:1px solid var(--border);border-radius:999px;background:#fff;height:48px;padding:0;font-family:var(--sans);font-weight:600;font-size:16px;color:var(--neutral-foreground);text-align:center;cursor:pointer;}
  .date-opt:active{background:var(--neutral);}
  /* scheduled day ring + booked call + Upcoming Schedule */
  .day-dot.ringed{box-shadow:inset 0 0 0 1.5px #b9b3ad;}   /* scheduled day marker — grey */
  .pill.blue{background:var(--select-blue);color:var(--primary);}
  #upcoming-block{display:flex;flex-direction:column;gap:16px;}
  .upcoming-pad{padding:12px 24px 0;}                          /* Figma: pt-12, px-24 */
  #upcoming-block .section-head{margin-top:0;padding-bottom:6px;}
  .upcoming{display:flex;flex-direction:column;}
  .upcoming-date{font-size:12px;font-weight:500;color:var(--foreground-muted);padding-top:16px;}
  .upcoming-row{display:flex;align-items:center;gap:6px;padding:16px 0;}
  .up-ring{width:8px;height:8px;border-radius:50%;box-shadow:inset 0 0 0 1.5px #b9b3ad;flex:none;}  /* same as date-strip ring, grey */
  .up-time{font-weight:500;font-size:14px;color:var(--foreground-muted);}
  .up-name{flex:1;font-weight:600;font-size:14px;color:var(--neutral-foreground);}
  .up-resched{display:flex;align-items:center;gap:4px;border:none;background:transparent;color:var(--primary-light);font-weight:600;font-size:14px;cursor:pointer;font-family:var(--sans);}
  .up-resched svg{width:12px;height:12px;}
  /* Surveys sheet */
  .surveys-body{display:flex;flex-direction:column;padding-top:10px;}
  .surveys-intro{font-size:13.5px;line-height:1.4;color:var(--foreground-muted);margin:2px 0 14px;}
  .survey-list{display:flex;flex-direction:column;margin-bottom:16px;}
  .survey-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;}
  .survey-row + .survey-row{border-top:1px solid var(--neutral);}
  .survey-name{font-weight:700;font-size:14px;color:var(--neutral-foreground);}
  .survey-meta{font-size:12px;color:var(--foreground-muted);margin-top:2px;}

  /* ---------- Home scheduling wizard (date → time → confirm → confirmation) ---------- */
  .sch-eyebrow{color:var(--foreground-muted)!important;font-weight:500!important;}
  .sch-badge{display:inline-flex;align-items:center;gap:4px;height:24px;padding:2px 12px;border-radius:999px;font-weight:600;font-size:12px;line-height:1;}
  .sch-badge svg{width:12px;height:12px;}
  .sch-div{height:1px;background:var(--neutral);margin:20px 0;}
  .sch-labels{display:flex;flex-direction:column;gap:2px;margin-bottom:24px;}
  .sch-labels .sched-label{font-weight:500;font-size:16px;color:var(--neutral-foreground);}
  .sch-sub{font-weight:400;font-size:14px;line-height:1.55;color:var(--foreground-muted);}
  .sch-optlist{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
  .sch-selrow{display:flex;align-items:center;gap:8px;width:100%;border:none;background:none;cursor:pointer;font-family:var(--sans);font-weight:500;font-size:16px;color:var(--neutral-foreground);padding:0;margin-bottom:16px;text-align:left;}
  .sch-selrow svg{width:16px;height:16px;color:var(--neutral-foreground);flex:none;}
  .date-opt.sel{border-color:var(--primary-light);background:var(--select-blue);color:var(--primary);}
  .sch-btns{display:flex;gap:8px;}
  .sch-btns .sheet-cancel.half{flex:none;width:120px;}
  .sch-confirm-btn{flex:1;border:none;cursor:pointer;background:var(--primary);color:var(--primary-foreground);font-family:var(--sans);font-weight:600;font-size:16px;height:48px;border-radius:999px;}
  .sch-confirmed{display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0 24px;}
  .sch-check{color:var(--primary-light);display:flex;}
  .sch-check svg{width:40px;height:40px;}
  .sch-confirmed-t{font-family:var(--sans);font-weight:600;font-size:16px;color:var(--neutral-foreground);}
  .sch-summary{display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:24px;}
  .sch-sum-ico{width:42px;height:42px;border-radius:999px;background:var(--primary-50);color:var(--primary);display:flex;align-items:center;justify-content:center;}
  .sch-sum-ico svg{width:24px;height:24px;}
  .sch-sum-name{font-weight:600;font-size:16px;color:var(--neutral-foreground);}
  .sch-sum-meta{font-size:14px;color:var(--foreground-muted);}
  .sch-done-btn{width:100%;border:none;cursor:pointer;background:var(--primary);color:var(--primary-foreground);font-family:var(--sans);font-weight:600;font-size:16px;padding:14px 0;border-radius:999px;}

  /* ---------- Video call flow (lobby / in-call / summary) ---------- */
  .screen.video{background:#1c1917;}
  .status-bar.dark{background:none;backdrop-filter:none;-webkit-backdrop-filter:none;}
  .screen.video .home-indicator{background:rgba(255,255,255,.5);}
  .vc{position:absolute;inset:0;color:#fafaf9;font-family:var(--sans);}
  .vc-ctrl{display:flex;flex-direction:column;align-items:center;gap:8px;width:84px;flex:none;}
  .vc-ctrl-btn{width:56px;height:56px;border-radius:999px;background:#44403b;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .vc-ctrl-btn svg{width:24px;height:24px;}
  .vc-ctrl-btn.red{background:#df6150;}
  .vc-ctrl-btn.off{background:#fbe8e5;color:#df6150;}   /* Unmute / Enable Cam (off state) */
  .vc-ctrl-label{font-size:12px;font-weight:500;color:#f5f5f4;white-space:nowrap;text-align:center;}

  /* Lobby */
  .vc-lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:0 24px;}
  .vc-preview{position:relative;width:225px;height:400px;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,#4a5568,#2b323b);}
  .vc-photo{width:100%;height:100%;object-fit:cover;display:block;}
  .vc-avatar{display:none;position:absolute;inset:0;background:#44403b;align-items:center;justify-content:center;}
  .vc-avatar-circle{width:54px;height:54px;border-radius:999px;background:#1c1917;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;}
  .vc-pip.camoff .vc-photo, .vc-preview.camoff .vc-photo{display:none;}
  .vc-pip.camoff .vc-avatar, .vc-preview.camoff .vc-avatar{display:flex;}
  .vc-precontrols{display:flex;gap:24px;}
  .vc-meta{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
  .vc-meta-title{font-size:16px;font-weight:600;color:#fafaf9;}
  .vc-meta-sub{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:#a6a09b;}
  .vc-meta-sub svg{width:12px;height:12px;}
  .vc-join{width:100%;max-width:354px;height:48px;border-radius:999px;background:#5fa33f;color:#f1f9ec;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:16px;}
  .vc-join svg{width:18px;height:18px;}
  .vc-back{border:none;background:none;color:#f5f5f4;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;}

  /* In-call */
  .vc-remote{position:absolute;top:59px;left:16px;right:16px;bottom:128px;border-radius:12px;overflow:hidden;background:linear-gradient(155deg,#3a4a5a,#1b232c);}
  .vc-remote-scrim{position:absolute;left:0;right:0;bottom:0;height:120px;background:linear-gradient(to bottom,transparent,rgba(38,38,38,0.85));}
  .vc-remote-name{position:absolute;left:16px;bottom:16px;font-size:16px;font-weight:600;color:#fafaf9;z-index:2;}
  .vc-flip{position:absolute;top:16px;left:16px;width:48px;height:48px;border-radius:999px;background:#44403b;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
  .vc-flip svg{width:24px;height:24px;}
  .vc-pip{position:absolute;right:16px;bottom:140px;width:110px;height:196px;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,#5a6472,#3a4048);box-shadow:0 4px 14px rgba(0,0,0,.35);}
  .vc-controlbar{position:absolute;left:0;right:0;bottom:0;background:rgba(28,25,23,0.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:22px 22px 0 0;display:flex;justify-content:center;gap:24px;padding:16px 24px calc(34px + env(safe-area-inset-bottom));}

  /* Call summary */
  .summary-wrap{display:flex;flex-direction:column;gap:20px;padding:0 8px 120px;}
  .sum-head{padding:4px 16px 0;display:flex;flex-direction:column;gap:4px;}
  .sum-h1{font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.2;letter-spacing:-.015em;color:var(--foreground);margin:0;}
  .sum-sub{font-family:var(--serif);font-weight:500;font-size:20px;line-height:1.2;color:var(--foreground-muted);margin:0;letter-spacing:-.01em;}
  .sum-card{background:var(--background);border-radius:12px;box-shadow:0 4px 15px rgba(38,38,38,.06);padding:16px;display:flex;flex-direction:column;gap:12px;}
  .sum-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .sum-label{font-size:14px;color:var(--foreground-muted);}
  .sum-value{font-size:14px;font-weight:500;color:var(--neutral-foreground);}
  .sum-badge{display:inline-flex;align-items:center;gap:4px;background:#f5f3ff;color:#6941c6;border-radius:999px;padding:3px 12px;font-size:12px;font-weight:600;}
  .sum-badge svg{width:12px;height:12px;}
  .sum-div{height:1px;background:var(--neutral);margin:4px -16px;}
  .sum-notes{display:flex;flex-direction:column;gap:6px;}
  .sum-notes-h{font-size:16px;font-weight:600;color:var(--neutral-foreground);}
  .sum-ai{display:flex;align-items:center;gap:6px;font-size:12px;font-style:italic;color:var(--primary-light);}
  .sum-ai svg{width:12px;height:12px;flex:none;}
  .sum-body{font-size:16px;line-height:1.55;color:var(--neutral-foreground);margin:4px 0 0;}

  /* ---------- Coach Kai chat sheet ---------- */
  .kai-sheet{height:800px;max-height:calc(100% - 20px);transition:transform .3s cubic-bezier(.2,.85,.25,1), padding-bottom .28s cubic-bezier(.2,.85,.25,1);}
  .kai-body{flex:1;min-height:0;display:flex;flex-direction:column;gap:20px;padding-top:8px;}
  .kai-msgs{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:flex-end;gap:24px;overflow-y:auto;}
  .kai-msgs::-webkit-scrollbar{display:none;}
  .kai-meta{display:flex;gap:8px;align-items:center;font-size:14px;font-weight:500;margin-bottom:6px;}
  .kai-name{color:#404040;}
  .kai-time{color:#949494;}
  .kai-ai .kai-text{font-family:var(--serif);font-weight:500;font-size:22px;line-height:1.3;color:var(--primary);letter-spacing:-.01em;}
  .kai-user{display:flex;flex-direction:column;align-items:flex-end;}
  .kai-user .kai-meta{justify-content:flex-end;}
  .kai-bubble{max-width:295px;background:var(--neutral);border-radius:16px;border-top-right-radius:4px;padding:12px 16px;font-size:16px;line-height:1.55;color:var(--neutral-foreground);}
  .kai-chips{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  .kai-chip{display:inline-flex;align-items:center;gap:8px;background:var(--neutral);border:none;border-radius:999px;padding:6px 12px;font-family:var(--sans);font-weight:500;font-size:14px;color:var(--neutral-foreground);cursor:pointer;text-align:left;}
  .kai-chip svg{width:12px;height:12px;color:var(--foreground-muted);flex:none;}
  .kai-input{display:flex;align-items:center;gap:8px;height:48px;border:1px solid var(--input-border);border-radius:999px;padding:0 8px 0 16px;background:var(--background);}
  .kai-field{flex:1;min-width:0;border:none;outline:none;background:none;font-family:var(--sans);font-weight:500;font-size:14px;color:var(--foreground);}
  .kai-field::placeholder{color:var(--foreground-muted);}
  .kai-send{width:36px;height:36px;border-radius:999px;background:var(--primary);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
  .kai-send svg{width:16px;height:16px;}
  /* Coach Kai reply — light-blue bubble (vs. the serif greeting) */
  .kai-reply{max-width:295px;background:var(--primary-lightest);border-radius:22px;border-top-left-radius:4px;padding:12px 16px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .kai-reply p{font-size:16px;line-height:1.55;color:var(--foreground);margin:0;}
  .kai-link{display:inline-flex;align-items:center;gap:4px;background:#91bded;border-radius:999px;padding:2px 10px 2px 12px;font-weight:600;font-size:14px;color:var(--primary);}
  .kai-link svg{width:12px;height:12px;}
  .kai-fb{width:295px;display:flex;gap:8px;justify-content:flex-end;padding:4px 19px 0 0;color:var(--foreground-muted);}
  .kai-fb svg{width:16px;height:16px;}

  /* ---------- Workouts tab (index) ---------- */
  .wko{display:flex;flex-direction:column;gap:24px;padding-bottom:120px;}
  .wko-title{display:flex;flex-direction:column;gap:24px;padding:0 16px;}
  .wko-eyebrow{display:flex;align-items:center;gap:4px;color:var(--foreground-muted);}
  .wko-eyebrow svg{width:16px;height:16px;}
  .wko-eyebrow span{font-weight:500;font-size:12px;line-height:1.4;}
  .wko-head{display:flex;flex-direction:column;gap:8px;}
  .wko-h1{font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.2;letter-spacing:-.015em;color:var(--foreground);margin:0;}
  .wko-sub{font-weight:500;font-size:18px;line-height:1.4;color:var(--foreground-muted);margin:0;}
  .wko-card{background:var(--background);border-radius:22px;box-shadow:0 4px 15px rgba(38,38,38,.06);display:flex;flex-direction:column;overflow:hidden;}
  .wko-card-body{display:flex;flex-direction:column;gap:14px;padding:20px 16px;}
  .wko-chip{width:32px;height:32px;border-radius:999px;background:var(--primary-50);color:var(--primary);display:flex;align-items:center;justify-content:center;}
  .wko-chip svg{width:16px;height:16px;}
  .wko-cg{display:flex;flex-direction:column;gap:4px;}
  .wko-ct{font-weight:600;font-size:18px;line-height:1.3;color:var(--foreground);}
  .wko-cs{font-weight:500;font-size:14px;line-height:1.5;color:var(--foreground-muted);}
  .wko-pills{display:flex;align-items:center;gap:8px;}
  .wko-pill{background:var(--neutral-200);color:var(--foreground-muted);border-radius:999px;padding:2px 12px;font-weight:500;font-size:14px;}
  .wko-pilltext{font-weight:500;font-size:14px;color:var(--foreground-muted);}
  .wko-btn{width:100%;height:48px;border-radius:999px;background:var(--primary);color:var(--primary-foreground);border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;}
  .wko-foot{border-top:1px solid var(--neutral);padding:14px 16px;display:flex;align-items:center;gap:8px;}
  .wko-foot-label{font-weight:500;font-size:14px;color:var(--neutral-foreground);}
  .wko-rings{display:flex;gap:6px;}
  .wko-ring{width:24px;height:24px;border-radius:999px;border:1.5px solid var(--border);flex:none;}
  .wko-count{margin-left:auto;font-weight:500;font-size:14px;color:var(--foreground-muted);}
  .wko-ring.done{background:var(--primary);border-color:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;}
  .wko-ring.done svg{width:14px;height:14px;}

  /* ---------- Solo workout flow ---------- */
  .solo{flex:1;display:flex;flex-direction:column;gap:24px;padding-bottom:8px;}
  .solo-title{padding:0 16px;display:flex;flex-direction:column;gap:12px;}
  .solo-eyebrow{display:flex;align-items:center;gap:4px;color:var(--foreground-muted);}
  .solo-eyebrow svg{width:16px;height:16px;}
  .solo-eyebrow span{font-weight:500;font-size:12px;line-height:1.4;}
  .solo-h1{font-family:var(--serif);font-weight:600;font-size:32px;line-height:1.2;letter-spacing:-.02em;color:var(--foreground);margin:0;}
  .solo-sub{font-weight:500;font-size:16px;line-height:1.5;color:var(--foreground-muted);margin:0;}
  .solo-actions{margin-top:auto;display:flex;gap:8px;padding:16px 16px 0;}
  .solo-cancel{width:120px;flex:none;height:48px;border-radius:999px;background:#fbe8e5;border:none;color:#df6150;font-family:var(--sans);font-weight:600;font-size:16px;cursor:pointer;}
  .solo-back{width:120px;flex:none;height:48px;border-radius:999px;background:var(--primary-foreground);border:1.5px solid var(--border);color:var(--neutral-foreground);font-family:var(--sans);font-weight:600;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .solo-back svg{width:16px;height:16px;}
  .solo-danger{flex:1;height:48px;border-radius:999px;background:#fbe8e5;border:none;color:#df6150;font-family:var(--sans);font-weight:600;font-size:16px;cursor:pointer;}
  .solo-primary{flex:1;height:48px;border-radius:999px;background:var(--primary);color:var(--primary-foreground);border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .solo-primary svg{width:16px;height:16px;}
  /* duration */
  .solo-durcard{margin:0 16px;background:var(--primary-50);border-radius:12px;padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:24px;}
  .solo-durval{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .solo-clock{width:64px;height:64px;border-radius:999px;background:var(--primary-lightest);color:var(--primary-light);display:flex;align-items:center;justify-content:center;}
  .solo-clock svg{width:40px;height:40px;}
  .solo-num{font-family:var(--sans);font-weight:600;font-size:64px;line-height:1;color:var(--primary);}
  .solo-numlabel{font-weight:500;font-size:18px;color:var(--primary-light);}
  .solo-durslider{width:100%;padding:0 24px;}
  .dslider{position:relative;height:32px;}
  .dslider input[type=range]{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;z-index:3;}
  .dslider-track{position:absolute;top:50%;left:0;right:0;height:8px;transform:translateY(-50%);background:var(--primary-lightest);border-radius:999px;overflow:hidden;}
  .dslider-fill{height:100%;background:var(--primary);border-radius:999px;width:var(--dpct,11%);}
  .dslider-thumb{position:absolute;top:50%;left:var(--dpct,11%);transform:translate(-50%,-50%);height:32px;min-width:64px;padding:0 8px;background:#fff;border:1px solid var(--border);border-radius:999px;box-shadow:0 4px 7.5px rgba(38,38,38,.14);display:flex;align-items:center;justify-content:center;gap:4px;z-index:2;}
  .dslider-thumb svg{width:10px;height:10px;color:var(--neutral-foreground);}
  .dslider-thumb .dval{font-weight:600;font-size:14px;color:var(--neutral-foreground);}
  .dslider-labels{display:flex;justify-content:space-between;margin-top:6px;font-weight:500;font-size:16px;color:var(--foreground-muted);}
  .solo-banner{margin:0 16px;display:flex;align-items:center;gap:10px;background:var(--warning-100);border:1px solid var(--warning-200);border-radius:12px;padding:12px 16px;}
  .solo-banner svg{width:16px;height:16px;color:var(--warning-700);flex:none;}
  .solo-banner span{font-weight:500;font-size:14px;line-height:1.4;color:var(--warning-700);}
  .slider.gold .slider-fill{background:#f0a110;}
  /* prep */
  .solo-checklist{margin:0 16px;display:flex;flex-direction:column;}
  .solo-check{display:flex;gap:12px;padding:16px 0;}
  .solo-check + .solo-check{border-top:1px solid var(--neutral);}
  .solo-check-ico{width:32px;height:32px;border-radius:8px;background:var(--neutral);color:var(--neutral-foreground);display:flex;align-items:center;justify-content:center;flex:none;}
  .solo-check-ico svg{width:16px;height:16px;}
  .solo-check-t{font-weight:600;font-size:16px;color:var(--neutral-foreground);}
  .solo-check-d{font-weight:500;font-size:14px;line-height:1.5;color:var(--foreground-muted);margin-top:2px;}
  .solo-check-d ul{margin:6px 0 0;padding-left:18px;}
  .solo-check-d li{margin:2px 0;}
  /* video */
  .solo-video-bg{position:absolute;inset:0;background:linear-gradient(160deg,#2b3742,#14191e);}
  .solo-vtitle{position:absolute;top:70px;left:20px;color:#fafaf9;z-index:2;}
  .solo-vtitle .t{font-weight:600;font-size:18px;}
  .solo-vtitle .tm{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
  .solo-vclose{position:absolute;top:64px;right:16px;width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
  .solo-vclose svg{width:20px;height:20px;}
  .solo-vcontrols{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;gap:24px;z-index:2;}
  .solo-vbtn{width:64px;height:64px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .solo-vbtn svg{width:26px;height:26px;}
  .solo-vbtn.main{width:88px;height:88px;background:#fff;color:#1c1917;}
  .solo-vbtn.main svg{width:34px;height:34px;}
  .solo-vprogress{position:absolute;left:20px;right:20px;bottom:70px;z-index:2;}
  .solo-vbar{height:4px;border-radius:2px;background:rgba(255,255,255,.25);overflow:hidden;}
  .solo-vbar-fill{height:100%;width:35%;background:#fff;border-radius:2px;}
  .solo-vtime{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:rgba(255,255,255,.7);}
  /* complete */
  .solo-party{color:var(--primary-light);display:flex;padding:0 16px;position:relative;}
  .solo-party svg{width:40px;height:40px;}
  .solo-party.celebrating{animation:pop-in .6s cubic-bezier(.2,.8,.3,1.5) both;}
  .solo-party.celebrating .confetti{animation:confetti-burst .75s ease-out var(--d,0s) both;}
  .solo-stats{margin:0 16px;background:var(--background);border-radius:16px;box-shadow:0 4px 15px rgba(38,38,38,.06);padding:16px;display:flex;flex-direction:column;gap:12px;}
  .solo-stat{display:flex;align-items:center;justify-content:space-between;font-size:14px;}
  .solo-stat .k{color:var(--foreground-muted);}
  .solo-stat .v{color:var(--neutral-foreground);font-weight:500;}
  .solo-level{background:var(--primary-50);color:var(--primary);border-radius:999px;padding:2px 12px;font-weight:600;font-size:12px;}
  .solo-rate{margin:0 16px;background:var(--primary-foreground);border-radius:16px;padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
  .solo-rate-h{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--neutral-foreground);text-align:center;}
  .solo-faces{display:flex;justify-content:space-between;}
  .solo-face{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:#d6d3d1;flex:1;padding:0;}
  .solo-face svg{width:30px;height:30px;transition:width .15s,height .15s;}
  .solo-face span{font-size:11px;font-weight:500;color:#d6d3d1;white-space:nowrap;}
  .solo-face.sel{color:#f0a110;}
  .solo-face.sel svg{width:40px;height:40px;}
  .solo-face.sel span{color:var(--neutral-foreground);}
  /* rotate screen */
  .solo-rotate{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:0 24px;text-align:center;}
  .solo-rotate h1{font-family:var(--serif);font-weight:500;font-size:26px;line-height:1.3;color:var(--foreground);margin:0;max-width:280px;}
  .solo-rotate-ico{color:var(--foreground-muted);}
  .solo-rotate-ico svg{width:56px;height:56px;transform:rotate(-28deg);}
  /* countdown (landscape) */
  .solo-cd{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:24px;background:linear-gradient(180deg, rgba(245,250,255,0) 0%, #f5faff 100%), #fafaf9;}
  .solo-cd-actions{display:flex;gap:12px;align-items:center;}
  .solo-cd-btn{writing-mode:vertical-rl;transform:rotate(180deg);border:none;cursor:pointer;border-radius:999px;padding:16px 14px;font-family:var(--sans);font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;max-height:360px;}
  .solo-cd-btn.cancel{background:#fbe8e5;color:#df6150;}
  .solo-cd-btn.pause{background:var(--primary-foreground);border:1.5px solid var(--border);color:var(--neutral-foreground);}
  .solo-cd-btn svg{width:16px;height:16px;}
  .solo-cd-ring{position:relative;width:120px;height:120px;flex:none;}
  .solo-cd-ring svg{width:120px;height:120px;transform:rotate(-90deg);}
  .cd-track{fill:none;stroke:var(--neutral-200);stroke-width:8;}
  .cd-arc{fill:none;stroke:var(--primary-light);stroke-width:8;stroke-linecap:round;stroke-dasharray:276.46;stroke-dashoffset:276.46;transition:stroke-dashoffset .9s linear;}
  .solo-cd-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:600;font-size:36px;color:var(--foreground);}
  .solo-cd-heading{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--serif);font-weight:500;font-size:26px;line-height:1.3;color:var(--neutral-foreground);text-align:center;max-height:400px;}

  /* ---------- Setup hub ---------- */
  .app-bar{
    display:flex;align-items:center;gap:8px;
    padding:60px 20px 24px;
  }
  .app-bar-side{width:32px;flex:none;}                 /* balances the info icon so the logo stays centered */
  .app-bar-logo{flex:1;display:flex;justify-content:center;color:var(--primary);}
  .logo-svg{display:block;width:auto;}
  .app-bar-logo .logo-svg{height:24px;}
  .logo .logo-svg{height:26px;}
  .app-bar-info{width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--primary-light);cursor:pointer;padding:0;}
  .app-bar-info svg{width:24px;height:24px;}

  .hub{display:flex;flex-direction:column;gap:16px;padding:8px 8px 8px;}
  .hub-titlewrap{display:flex;flex-direction:column;gap:2px;padding:0 8px;}
  .remaining{display:flex;flex-direction:column;gap:12px;margin:12px 0;}
  #remaining-block{display:flex;flex-direction:column;gap:16px;}
  #remaining-block.removed{opacity:0;transition:opacity .3s ease;}   /* whole section clears once synced */
  .need{display:flex;flex-direction:column;gap:12px;}
  .need.removed{opacity:0;transition:opacity .25s ease;}   /* fades out, then display:none via JS */
  .hub-group{display:flex;flex-direction:column;gap:12px;}   /* rows whose divider stays inset */
  .hub-eyebrow{font-family:var(--serif);font-weight:600;font-size:20px;line-height:1.2;color:var(--primary-light);letter-spacing:-.015em;}
  .hub-title{font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.2;color:var(--foreground);margin:0 0 2px;letter-spacing:-.015em;}

  .bar-banner{display:flex;align-items:center;gap:8px;border-radius:12px;padding:12px 16px;font-weight:500;font-size:12px;line-height:1.4;}
  .bar-banner svg{width:16px;height:16px;flex:none;}
  .bar-banner.amber{background:var(--warning-100);color:var(--warning-700);}
  .bar-banner.green{background:#e3f4e1;color:#3f7a2e;}
  .bar-banner.soft{align-items:flex-start;}
  .lock-badge{width:32px;height:32px;border-radius:7px;background:var(--warning-50);color:var(--warning-700);display:flex;align-items:center;justify-content:center;flex:none;}
  .lock-badge svg{width:16px;height:16px;}

  .date-strip{display:flex;gap:4px;justify-content:space-between;}
  .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;border-radius:12px;}
  .day-d{font-size:12px;font-weight:500;color:var(--foreground-muted);}
  .day-n{font-size:18px;font-weight:600;color:var(--neutral-foreground);}
  .day.active{background:var(--primary-lightest);}
  .day.active .day-d{color:var(--neutral-foreground);}
  .day.active .day-n{color:var(--foreground);}
  .day-dot{width:8px;height:8px;border-radius:50%;}            /* gap for future event circles */

  /* One white card wraps everything below the page title */
  .hub-card{
    background:var(--background);border-radius:22px;
    box-shadow:0 4px 15px rgba(38,38,38,.06);
    display:flex;flex-direction:column;gap:16px;padding:16px 0;overflow:hidden;
  }
  .hub-pad{padding:0 16px;}
  .hub-div{height:1px;background:var(--neutral);}              /* hairline section separator */
  /* Schedule = a light-blue sub-card; other items are plain rows */
  .schedule-card{display:flex;align-items:flex-start;gap:12px;background:var(--primary-50);border-radius:12px;padding:12px 16px;}
  .hub-row{display:flex;align-items:flex-start;gap:8px;}
  .task-ico{width:32px;height:32px;border-radius:8px;background:var(--neutral);color:var(--neutral-foreground);display:flex;align-items:center;justify-content:center;flex:none;}
  .task-ico svg{width:16px;height:16px;}
  .task-ico.lightest{background:var(--primary-lightest);color:var(--primary);}
  .task-ico.soft{background:var(--primary-foreground);color:var(--foreground-muted);}
  .task-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .task-h{font-weight:600;font-size:14px;line-height:1.4;color:var(--neutral-foreground);}
  .task-s{font-size:12px;line-height:1.4;color:var(--foreground-muted);}
  .schedule-card .task-s{color:var(--primary-light);}
  .pill{border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:14px;height:32px;border-radius:999px;padding:0 14px;flex:none;white-space:nowrap;display:flex;align-items:center;align-self:center;}
  .pill.solid{background:var(--primary);color:var(--primary-foreground);}
  .pill.outline{background:transparent;border:1.5px solid var(--border);color:var(--neutral-foreground);}
  .section-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-.015em;color:var(--foreground);margin-top:4px;cursor:pointer;}
  .section-head svg{width:16px;height:16px;color:var(--foreground-muted);transition:transform .25s ease;}
  .section-head.collapsed svg{transform:rotate(180deg);}
  .section-body.hidden{display:none;}

  /* ---------- Primary App: Home ---------- */
  .home{display:flex;flex-direction:column;gap:24px;padding-bottom:120px;}
  .home-title{display:flex;flex-direction:column;gap:24px;padding:0 16px;}
  .home-crumb{display:flex;align-items:center;gap:4px;color:var(--foreground-muted);}
  .home-crumb svg{width:16px;height:16px;}
  .home-crumb span{font-weight:600;font-size:12px;line-height:1.4;}
  .home-heading{display:flex;flex-direction:column;gap:4px;}
  .home-greeting{font-family:var(--serif);font-weight:600;font-size:20px;line-height:1.2;color:var(--primary-light);letter-spacing:-.015em;}
  .home-h1{font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.2;color:var(--foreground);letter-spacing:-.015em;margin:0;}

  .home-card{
    background:var(--background);border-radius:22px;
    box-shadow:0 4px 15px rgba(38,38,38,.06);
    display:flex;flex-direction:column;gap:20px;overflow:hidden;
  }
  .home-hr{height:1px;background:var(--neutral);width:100%;}
  .home-hr.flush{margin-top:-20px;}   /* divider sits flush under the grey date bar (cancels card gap) */

  /* card 1 — timeline + selected-date bar */
  .hc-top{display:flex;flex-direction:column;gap:12px;padding-top:16px;}
  .home-strip{display:flex;gap:4px;padding:0 16px;}
  .home-day{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;}
  .home-day.today{background:var(--primary-lightest);}                /* today = Mon 13 (filled) */
  .home-day.sel{box-shadow:inset 0 0 0 2px var(--primary-light);}     /* tapped day = blue ring */
  .home-day.sel.gold{box-shadow:inset 0 0 0 2px #e69e1a;}
  .hd-d{font-size:12px;font-weight:500;color:var(--foreground-muted);line-height:1;}
  .home-day.today .hd-d{color:var(--neutral-foreground);}
  .hd-n{font-size:18px;font-weight:600;color:var(--neutral-foreground);line-height:1;}
  .home-day.today .hd-n{color:var(--foreground);}
  .home-day.past .hd-d, .home-day.past .hd-n{color:#a6a09b;}          /* past day — greyed out */
  .hd-dot{width:8px;height:8px;border-radius:50%;}
  .hd-dot.on{box-shadow:inset 0 0 0 1.5px #b9b3ad;}                   /* grey event ring — matches other sections */
  .hd-dot.done{background:#91bded;}                                   /* completed event dot (Monday) */
  .hd-dot.solid{background:#0c3b6e;}                                  /* active-day event dot (navy, filled) */
  .hc-datebar{background:var(--neutral);min-height:44px;display:flex;align-items:center;padding:6px 16px;font-weight:600;font-size:16px;line-height:1.2;color:var(--neutral-foreground);}
  .date-back{border:none;background:none;cursor:pointer;color:var(--neutral-foreground);display:flex;align-items:center;justify-content:center;padding:0;margin-right:10px;flex:none;}
  .date-back svg{width:20px;height:20px;}

  .hc-mid{display:flex;flex-direction:column;gap:16px;}
  .hc-block{padding:0 16px;}
  .home-sec-head{display:flex;align-items:center;gap:8px;}
  .home-sec-head h3{flex:1;min-width:0;font-family:var(--serif);font-weight:600;font-size:20px;line-height:1.2;letter-spacing:-.015em;color:var(--foreground);margin:0;}
  .home-sec-head svg{width:12px;height:12px;color:var(--foreground-muted);flex:none;}

  .act-list{display:flex;flex-direction:column;gap:12px;}
  .act-item{display:flex;align-items:center;gap:8px;}
  .act-ico{width:32px;height:32px;border-radius:7px;background:var(--primary-foreground);color:var(--foreground-muted);display:flex;align-items:center;justify-content:center;flex:none;}
  .act-ico svg{width:16px;height:16px;}
  .act-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .act-h{font-weight:600;font-size:14px;line-height:1.4;color:var(--neutral-foreground);}
  .act-s{font-size:12px;font-weight:500;line-height:1.4;color:var(--foreground-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .act-btn{height:32px;border-radius:999px;padding:0 12px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;border:none;flex:none;display:flex;align-items:center;justify-content:center;}
  .act-btn.solid{background:var(--primary);color:var(--primary-foreground);}
  .act-btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--neutral-foreground);min-width:60px;}

  .home-progress-box{background:var(--primary-foreground);border-radius:12px;padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .pp-label{font-weight:600;font-size:14px;line-height:1.2;color:var(--neutral-foreground);text-align:center;}
  .pp-ring{width:64px;height:64px;border-radius:50%;border:5px solid var(--neutral-200);display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
  .pp-ring span{font-weight:600;font-size:16px;color:var(--neutral-foreground);}

  .home-tip{background:var(--success-200);padding:16px 16px 20px;display:flex;gap:8px;align-items:flex-start;}
  .tip-ico{width:32px;height:32px;border-radius:7px;background:var(--success-50);color:#5fa33f;display:flex;align-items:center;justify-content:center;flex:none;}
  .tip-ico svg{width:16px;height:16px;}
  .tip-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .tip-h{font-weight:600;font-size:12px;line-height:1.4;color:var(--success-700);}
  .tip-b{font-weight:500;font-size:14px;line-height:1.4;color:var(--success-900);}

  /* card 2 — Workouts */
  .wk-card-wrap{gap:16px;padding-bottom:20px;}
  .wk-head{padding-top:20px;display:flex;align-items:center;gap:4px;}
  .wk-title{font-family:var(--serif);font-weight:600;font-size:20px;line-height:1.2;letter-spacing:-.015em;color:var(--foreground);margin:0;flex:1;}
  .wk-row{display:flex;gap:16px;}
  .wk-card{flex:1;min-width:0;background:var(--primary-foreground);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:16px;}
  .wk-top{display:flex;flex-direction:column;gap:12px;}
  .wk-hg{display:flex;flex-direction:column;gap:2px;}
  .wk-h{font-weight:600;font-size:18px;line-height:1.4;color:var(--neutral-foreground);white-space:nowrap;}
  .wk-badge{align-self:flex-start;background:var(--neutral-200);border-radius:999px;padding:2px 12px;font-weight:500;font-size:14px;line-height:1.4;color:var(--foreground-muted);}
  .wk-checks{display:flex;gap:4px;}
  .wk-circle{width:16px;height:16px;flex:none;border-radius:999px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:#fff;}
  .wk-circle svg{width:11px;height:11px;}
  .wk-circle.done{background:var(--primary);border-color:var(--primary);}
  .wk-circle.gold{background:#e69e1a;border-color:#e69e1a;}
  .act-btn.disabled{background:var(--neutral-200);color:#a6a09b;cursor:default;}
  .act-btn.completed{background:#91bded;color:#fff;cursor:default;}   /* completed state — light-blue dot color */

  /* tappable date strip: completed (navy) dot + gold star + gold active cell */
  .home-day{cursor:pointer;}
  .hd-star{width:12px;height:12px;display:flex;align-items:center;justify-content:center;}
  .hd-star svg{width:12px;height:12px;fill:#e69e1a;stroke:#e69e1a;}
  .home-empty{background:var(--primary-foreground);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:500;font-size:16px;line-height:1.2;color:var(--foreground-muted);}

  /* streak badge */
  .wk-streak{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 12px;border-radius:999px;font-weight:500;font-size:14px;flex:none;white-space:nowrap;}
  .wk-streak svg{width:12px;height:12px;}
  .wk-streak.light{background:var(--warning-200);color:var(--warning-700);}
  .wk-streak.gold{background:#e69e1a;color:var(--warning-50);}

  /* live call card (Call Soon / Call Imminent) */
  .call-card{display:flex;align-items:center;gap:12px;background:#fdf4f3;border-radius:12px;padding:12px 16px;transition:background-color .4s ease;}
  .call-card.soon{background:#fbe8e5;}
  .cc-ico{width:32px;height:32px;border-radius:7px;background:#f9d4cf;color:#df6150;display:flex;align-items:center;justify-content:center;flex:none;}
  .cc-ico svg{width:16px;height:16px;}
  .cc-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .cc-h{font-weight:600;font-size:14px;line-height:1.4;color:var(--neutral-foreground);}
  .cc-s{font-weight:600;font-size:12px;line-height:1.4;color:#df6150;}
  .cc-join{height:32px;border-radius:999px;padding:0 14px;font-family:var(--sans);font-weight:600;font-size:14px;border:none;flex:none;transition:background-color .4s ease,color .4s ease;}
  .cc-join.now{background:#e16451;color:#fafaf9;cursor:pointer;}
  .cc-join.soon{background:#fdf4f3;color:#f9d4cf;cursor:default;}

  /* amber scheduling-alert card (Wednesday) */
  .sched-alert{display:flex;align-items:center;gap:10px;background:var(--warning-200);border-radius:12px;padding:12px 16px;}
  .sa-ico{color:#e69e1a;display:flex;flex:none;}
  .sa-ico svg{width:20px;height:20px;}
  .sa-text{flex:1;min-width:0;font-weight:600;font-size:14px;line-height:1.4;color:var(--neutral-foreground);}
  .sa-btn{height:32px;border-radius:999px;padding:0 14px;background:#e69e1a;color:#fafaf9;font-family:var(--sans);font-weight:600;font-size:14px;border:none;cursor:pointer;flex:none;white-space:nowrap;}

  /* gold completion bar (Sunday - All Complete) */
  .done-bar{display:flex;align-items:center;gap:8px;background:#e69e1a;border-radius:12px;padding:14px 16px;}
  .db-ico{width:32px;height:32px;border-radius:7px;background:var(--warning-50);color:#e69e1a;display:flex;align-items:center;justify-content:center;flex:none;}
  .db-ico svg{width:16px;height:16px;}
  .db-text{flex:1;min-width:0;font-weight:600;font-size:14px;line-height:1.4;color:var(--warning-50);}
  .pp-ring.gold{border-color:#e69e1a;}

  /* Upcoming Schedule (home) */
  .up-list{display:flex;flex-direction:column;padding-top:8px;}
  .up-item{display:flex;align-items:center;gap:8px;padding:12px 0;}
  .up-item + .up-item{border-top:1px solid var(--neutral);}
  .up-dot{width:8px;height:8px;border-radius:50%;box-shadow:inset 0 0 0 1.5px #b9b3ad;flex:none;}
  .up-dot.now{background:#e16451;box-shadow:none;}
  .up-dot.done{background:#91bded;box-shadow:none;}                    /* completed event */
  .up-ico{width:32px;height:32px;border-radius:7px;background:var(--primary-foreground);color:var(--neutral-foreground);display:flex;align-items:center;justify-content:center;flex:none;}
  .up-ico svg{width:16px;height:16px;}
  .up-done{border:none;background:var(--neutral-200);color:#a6a09b;font-family:var(--sans);font-weight:600;font-size:13px;border-radius:999px;padding:0 12px;height:28px;cursor:default;flex:none;white-space:nowrap;}
  .up-time{font-weight:500;font-size:13px;color:var(--foreground-muted);white-space:nowrap;}
  .up-name{flex:1;min-width:0;font-weight:600;font-size:14px;color:var(--neutral-foreground);}
  .up-link{display:flex;align-items:center;gap:2px;border:none;background:none;color:var(--primary-light);font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;}
  .up-link.now{color:#df6150;}
  .up-link svg{width:12px;height:12px;}

  .tab-fab.gold{background:#e69e1a;}

  /* fixed bottom tab bar + Coach Kai FAB */
  .tab-bar{
    position:absolute;left:0;right:0;bottom:0;z-index:15;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    border-radius:12px 12px 0 0;
    box-shadow:0 -6px 22px rgba(38,38,38,.12);
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 16px calc(30px + env(safe-area-inset-bottom));
  }
  .tab-items{display:flex;gap:4px;align-items:center;}
  .tab-item{width:64px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 0;border-radius:12px;color:var(--foreground-muted);}
  .tab-item svg{width:24px;height:24px;}
  .tab-item span{font-weight:600;font-size:10px;line-height:1;}
  .tab-item.active{color:var(--primary);}
  .tab-fab{width:64px;height:64px;border-radius:999px;background:var(--primary);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
  .tab-fab svg{width:24px;height:24px;}

  /* ---------- Full-bleed device mode (real phone, edge-to-edge) ---------- */
  @media (max-width:460px){
    body{
      padding:0;background:var(--page-bg);align-items:stretch;
      height:100vh;height:100dvh;min-height:0;overflow:hidden;
    }
    .stage-caption{display:none;}
    .proto-nav{display:none;}
    .phone{
      width:100vw;height:100vh;height:100dvh;max-height:none;
      border-radius:0;padding:0;box-shadow:none;
    }
    .phone-screen{border-radius:0;}
    /* No simulated chrome on a real device — the OS provides it */
    .phone-screen::before{display:none;}   /* Dynamic Island */
    .status-bar{display:none;}             /* fake 9:41 / icons */
    .home-indicator{display:none;}         /* fake home pill */
    /* Clear the real notch + home indicator via safe-area insets */
    .scroll{
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }
    /* Status bar is gone on mobile, so the header no longer needs to clear it */
    header.brand{padding-top:14px;}
    /* Browser chrome sits below the real notch; .scroll already pads the safe area */
    .browser-bar{top:env(safe-area-inset-top);}
    .screen.web header.brand{padding-top:76px;}
    /* native app bar: scroll already clears the notch, so drop the desktop status-bar padding */
    .app-bar{padding-top:14px;}
  }
</style>

function I(name, sw){

/* ============================================================

   ============================================================ */
function badge(icon){ return `<div class="icon-badge">${I(icon)}</div>`; }
function qhead(icon,q){ return `<div class="q-head">${badge(icon)}<div class="question">${q}</div></div>`; }
function question(q){ return `<div class="question">${q}</div>`; }
function subtle(t){ return `<div class="q-subtle">${t}</div>`; }

function tinput(ph, opts={}){
  const lead = opts.lead ? `<span class="field-icon field-icon-lead">${I(opts.lead)}</span>` : '';
  const trail = opts.icon ? `<span class="field-icon">${I(opts.icon)}</span>` : '';
  if(lead || trail){
    return `<div class="input-wrap${opts.lead?' lead':''}">${lead}<input class="input" placeholder="${ph}" />${trail}</div>`;
  }
  return `<input class="input" placeholder="${ph}" />`;
}
function codeboxes(n){
  let b='';
  for(let i=0;i<n;i++){ b+=`<input class="code-box" type="text" inputmode="numeric" maxlength="1" placeholder="#" />`; }
  return `<div class="code-boxes">${b}</div>`;
}
function field(label, inner){ return `<div class="field"><label class="field-label">${label}</label>${inner}</div>`; }
function select(ph, options){
  return `<div class="select-wrap"><select class="input"><option value="" selected disabled hidden>${ph}</option>${options.map(o=>`<option>${o}</option>`).join('')}</select><span class="field-icon">${I('chevron-down')}</span></div>`;
}
function opt(kind,label,reveal){
  return `<div class="option" data-kind="${kind}"${reveal?` data-reveal="${reveal}"`:''}><span class="${kind}"></span><span class="opt-label">${label}</span></div>`;
}
function group(kind, options, seg){
  return `<div class="opt-group${seg?' segmented':''}" data-mode="${kind==='checkbox'?'multi':'single'}">${options.join('')}</div>`;
}
function cond(id, inner){ return `<div class="conditional" id="${id}">${inner}</div>`; }
function slider(value,left,right){
  return `<div class="slider-wrap"><div class="slider"><input type="range" min="1" max="10" value="${value}" />`
    +`<div class="slider-track"><div class="slider-fill"></div></div>`
    +`<div class="slider-thumb"><span class="chev">&#8249;</span><span class="val">${value}</span><span class="chev">&#8250;</span></div></div>`
    +`<div class="slider-labels"><span>${left}</span><span>${right}</span></div></div>`;
}
function qcard(sections){ return `<div class="qcard">${sections.join('<div class="qcard-divider"></div>')}</div>`; }
function section(inner){ return `<div class="qcard-section">${inner}</div>`; }
