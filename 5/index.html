function I(name, sw){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||2}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

/* ============================================================
   Markup builders
   ============================================================ */
function badge(icon){ return `<div class="icon-badge">${I(icon)}</div>`; }
function qhead(icon,q){ return `<div class="q-head">${badge(icon)}<div class="question">${q}</div></div>`; }
function question(q){ return `<div class="question">${q}</div>`; }
function subtle(t){ return `<div class="q-subtle">${t}</div>`; }

function tinput(ph, opts={}){
  const lead = opts.lead ? `<span class="field-icon field-icon-lead">${I(opts.lead)}</span>` : '';
  const trail = opts.icon ? `<span class="field-icon">${I(opts.icon)}</span>` : '';
  if(lead || trail){
    return `<div class="input-wrap${opts.lead?' lead':''}">${lead}<input class="input" placeholder="${ph}" />${trail}</div>`;
  }
  return `<input class="input" placeholder="${ph}" />`;
}
function codeboxes(n){
  let b='';
  for(let i=0;i<n;i++){ b+=`<input class="code-box" type="text" inputmode="numeric" maxlength="1" placeholder="#" />`; }
  return `<div class="code-boxes">${b}</div>`;
}
function field(label, inner){ return `<div class="field"><label class="field-label">${label}</label>${inner}</div>`; }
function select(ph, options){
  return `<div class="select-wrap"><select class="input"><option value="" selected disabled hidden>${ph}</option>${options.map(o=>`<option>${o}</option>`).join('')}</select><span class="field-icon">${I('chevron-down')}</span></div>`;
}
function opt(kind,label,reveal){
  return `<div class="option" data-kind="${kind}"${reveal?` data-reveal="${reveal}"`:''}><span class="${kind}"></span><span class="opt-label">${label}</span></div>`;
}
function group(kind, options, seg){
  return `<div class="opt-group${seg?' segmented':''}" data-mode="${kind==='checkbox'?'multi':'single'}">${options.join('')}</div>`;
}
function cond(id, inner){ return `<div class="conditional" id="${id}">${inner}</div>`; }
function slider(value,left,right){
  return `<div class="slider-wrap"><div class="slider"><input type="range" min="1" max="10" value="${value}" />`
    +`<div class="slider-track"><div class="slider-fill"></div></div>`
    +`<div class="slider-thumb"><span class="chev">&#8249;</span><span class="val">${value}</span><span class="chev">&#8250;</span></div></div>`
    +`<div class="slider-labels"><span>${left}</span><span>${right}</span></div></div>`;
}
function qcard(sections){ return `<div class="qcard">${sections.join('<div class="qcard-divider"></div>')}</div>`; }
function section(inner){ return `<div class="qcard-section">${inner}</div>`; }

/* ----- Native-app Setup hub builders ----- */
function dateStrip(activeIdx){
  const days=[['Mon',6],['Tue',7],['Wed',8],['Thu',9],['Fri',10],['Sat',11],['Sun',12]];
  return `<div class="date-strip">`+days.map(([d,n],i)=>
    `<div class="day${i===activeIdx?' active':''}"><span class="day-d">${d}</span><span class="day-n">${n}</span><span class="day-dot"></span></div>`
  ).join('')+`</div>`;
}
function hubRow(icon,h,s,btn,style,iconVar){
  return `<div class="hub-row"><div class="task-ico${iconVar?' '+iconVar:''}">${I(icon)}</div>`
    + `<div class="task-text"><div class="task-h">${h}</div><div class="task-s">${s}</div></div>`
    + `<button class="pill ${style}">${btn}</button></div>`;
}
/* Schedule-your-first-call card (prompt) and its booked-call replacement */
const SCHEDULE_PROMPT =
  `<div class="schedule-card"><div class="task-ico lightest">${I('smartphone')}</div>`
  + `<div class="task-text"><div class="task-h">Schedule your first call</div><div class="task-s">Schedule an introduction with your health coach.</div></div>`
  + `<button class="pill solid" data-sch-open="call">Schedule</button></div>`;
function scheduleBooked(short, time){
  return `<div class="call-card now"><div class="cc-ico">${I('smartphone')}</div>`
    + `<div class="cc-text"><div class="cc-h">Call with Coach Tanya</div><div class="cc-s">${short}, ${time || '2:30pm'} · 30 min</div></div>`
    + `<button class="cc-join now" data-join-call>Join Now</button></div>`;
}

  wed:{
    eyebrow:'Welcome back!', headline:'Keep it going!',
    dateFull:'Wednesday, April 15, 2026', subline:'No live activities scheduled today.',
    strip:{active:2, dots:['','done','','event','','','event']},
    hero:{type:'alert', h:'Group learning has not been scheduled.', btn:'Schedule Now'},
    live:null,
    progress:{pct:0}, today:true, tip:true,
    upcoming:null,
    workouts:{ streak:null, group:{c:[1],btn:'Join',style:'solid'}, solo:{c:[0,0],btn:'Start',style:'solid'} }
  },
  thu: futureDay('Thursday, April 16, 2026', 3),
  fri: futureDay('Friday, April 17, 2026', 4),
  sat: futureDay('Saturday, April 18, 2026', 5),
  sun: Object.assign(futureDay('Sunday, April 19, 2026', 6), {
    eventItem:[['school','Group Learning','Sun, 2:30pm • 30min','Reschedule','outline']]
  })   // future preview (no gold); Group Learning shown as an activity-style row (no header)
};
const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];

const TODAY_KEY = 'tue';                // today is Tuesday the 14th
const TODAY_IDX = 1;
const EVENT_DAYS = [1,6];               // days with a live event (Tue = coach call, Sun = Group Learning)
const STAR_DAYS  = [0,1,2,3];           // Sunday celebration: completed days get gold stars
function homeDateStrip(d){
  const days=[['Mon',13],['Tue',14],['Wed',15],['Thu',16],['Fri',17],['Sat',18],['Sun',19]];
  const sel = d.strip.active, gold = !!d.strip.gold;
  return `<div class="home-strip">`+days.map(([lab,n],i)=>{
    let cls = 'home-day';
    if(i===TODAY_IDX) cls += ' today';                       // filled — today
    else if(i<TODAY_IDX) cls += ' past';                     // greyed — past day
    if(i===sel && i!==TODAY_IDX) cls += gold ? ' sel gold' : ' sel';   // blue (or gold) ring — tapped day
    let mark = '<span class="hd-dot"></span>';
    if(gold){ if(STAR_DAYS.includes(i)) mark = `<span class="hd-star">${I('star')}</span>`; }
    else if(i<TODAY_IDX) mark = '<span class="hd-dot done"></span>';   // past day — completed ring
    else if(i===TODAY_IDX && EVENT_DAYS.includes(i)) mark = '<span class="hd-dot solid"></span>';   // active day event — solid navy
    else if(EVENT_DAYS.includes(i)) mark = '<span class="hd-dot on"></span>';
    return `<div class="${cls}" data-home-day="${DAY_KEYS[i]}">`
      + `<span class="hd-d">${lab}</span><span class="hd-n">${n}</span>${mark}</div>`;
  }).join('')+`</div>`;
}
function actItem(icon,h,sub,btn,style){
  return `<div class="act-item"><div class="act-ico">${I(icon)}</div>`
    + `<div class="act-text"><div class="act-h">${h}</div><div class="act-s">${sub}</div></div>`
    + `<button class="act-btn ${style}">${btn}</button></div>`;
}
function callCard(hero){
  const soon = hero.variant !== 'now';
  const btn = soon ? `<button class="cc-join soon">${hero.btn}</button>` : `<button class="cc-join now">${hero.btn}</button>`;
  return `<div class="call-card ${soon?'soon':'now'}"${soon?' data-callsoon':''}><div class="cc-ico">${I('smartphone')}</div>`
    + `<div class="cc-text"><div class="cc-h">${hero.h}</div><div class="cc-s">${hero.s}</div></div>${btn}</div>`;
}
/* Tuesday call card: starts "Join Soon", flips to "Join Now" 3s after the home is shown */
function startCallCountdown(scr){
  const card = scr && scr.querySelector('.call-card[data-callsoon]');
  if(!card) return;
  if(card._t) clearTimeout(card._t);
  card._t = setTimeout(()=>{
    if(!scr.classList.contains('active')) return;
    card.classList.remove('soon');
    const s = card.querySelector('.cc-s'); if(s) s.textContent = 'Starting now • 10:30am';
    const btn = card.querySelector('.cc-join'); if(btn){ btn.classList.remove('soon'); btn.classList.add('now'); btn.textContent = 'Join Now'; }
    card.removeAttribute('data-callsoon');
  }, 3000);
}
function schedAlert(h,btn){
  return `<div class="sched-alert"><span class="sa-ico">${I('circle-alert')}</span>`
    + `<span class="sa-text">${h}</span><button class="sa-btn">${btn}</button></div>`;
}
function doneBar(h){
  return `<div class="done-bar"><div class="db-ico">${I('party-popper')}</div><div class="db-text">${h}</div></div>`;
}
function homeUpcoming(rows, title, noHeader){
  return `<div class="hc-block">`
    + (noHeader ? '' : `<div class="home-sec-head"><h3>${title||'Upcoming Schedule'}</h3>${I('chevron-down')}</div>`)
    + `<div class="up-list"${noHeader?' style="padding-top:0;"':''}>` + rows.map(r=>{
        let action;
        if(r.action==='join') action = `<button class="up-link now">Join Now ${I('chevron-right')}</button>`;
        else if(r.action==='completed') action = `<button class="up-done" disabled>Completed</button>`;
        else action = `<button class="up-link">Reschedule ${I('chevron-right')}</button>`;
        const dotCls = r.ring==='now' ? 'now' : (r.ring==='done' ? 'done' : '');
        const lead = r.icon
          ? `<span class="up-ico">${I(r.icon)}</span>`
          : `<span class="up-dot ${dotCls}"></span>`;
        return `<div class="up-item">${lead}`
          + `<span class="up-time">${r.date?r.date+', ':''}${r.time}</span>`
          + `<span class="up-name">${r.name}</span>${action}</div>`;
      }).join('') + `</div></div>`;
}
function wkCircle(state){
  if(state===1) return `<span class="wk-circle done">${I('check',3)}</span>`;
  if(state===2) return `<span class="wk-circle gold">${I('check',3)}</span>`;
  return `<span class="wk-circle"></span>`;
}
function wkCol(h,badge,circles,btn,style){
  const c = circles.map(wkCircle).join('');
  const bcls = style==='disabled' ? 'act-btn disabled' : 'act-btn solid';
  return `<div class="wk-card"><div class="wk-top">`
    + `<div class="wk-hg"><div class="wk-h">${h}</div><div><span class="wk-badge">${badge}</span></div></div>`
    + `<div class="wk-checks">${c}</div></div>`
    + `<button class="${bcls}" style="width:100%;">${btn}</button></div>`;
}
function streakBadge(kind){
  if(!kind) return '';
  const txt = kind==='gold' ? 'You started a new streak!' : '3 week streak';
  return `<span class="wk-streak ${kind}">${I('trophy')}${txt}</span>`;
}
function renderHome(key){
  const dayKey = HOME_DAYS[key] ? key : TODAY_KEY;
  const d = HOME_DAYS[dayKey];
  const isPreview = dayKey !== TODAY_KEY;       // today is Tuesday; past/future days are lighter previews
  const mid = [];
  // "Schedule your Live Activities" + "Today's Activities" are today-only; the Sunday completion bar stays.
  if(d.hero && d.hero.type==='done'){
    mid.push(`<div class="hc-block">${doneBar(d.hero.h)}</div>`);
  } else if(!isPreview){
    // the live call card is its own block, sitting ABOVE "Schedule your Live Activities"
    if(d.hero && d.hero.type==='call'){ mid.push(`<div class="hc-block">${callCard(d.hero)}</div>`); }
    if(d.hero && d.hero.type==='alert'){
      mid.push(`<div class="hc-block"><div class="home-sec-head"><h3>Schedule your Live Activities</h3>${I('chevron-down')}</div>`
        + `<div style="padding-top:8px;">${schedAlert(d.hero.h, d.hero.btn)}</div></div>`);
    } else if(d.live){
      mid.push(`<div class="hc-block"><div class="home-sec-head"><h3>Schedule your Live Activities</h3>${I('chevron-down')}</div>`
        + `<div class="act-list" style="padding-top:8px;">${d.live.map((r,i)=> actItem(r[0],r[1],r[2],'Schedule','solid')
          + (i<d.live.length-1?`<div class="home-hr"></div>`:'')).join('')}</div></div>`);
    }
  }
  // Progress + Today's Activities belong to TODAY only — previews omit them
  if(!isPreview){
    mid.push(`<div class="hc-block"><div class="home-progress-box">`
      + `<div class="pp-label">Progress Section (display tbd)</div>`
      + `<div class="pp-ring${d.progress&&d.progress.gold?' gold':''}"><span>${d.progress?d.progress.pct:0}%</span></div></div></div>`);
    if(d.today){
      mid.push(`<div class="hc-block"><div class="home-sec-head"><h3>Today&rsquo;s Activities</h3>${I('chevron-down')}</div>`
        + `<div class="act-list" style="padding-top:16px;">`
        + actItem('dumbbell','Solo Workout','Min. 2x per week','Start','outline')
        + `<div class="home-hr"></div>`
        + actItem('book-open-text','Today&rsquo;s Article','Cool Article Title Here','Read','outline')
        + `</div></div>`);
    }
  }
  if(d.eventItem){ mid.push(`<div class="hc-block"><div class="act-list">`
      + d.eventItem.map((r,i)=> actItem(r[0],r[1],r[2],r[3],r[4]) + (i<d.eventItem.length-1?`<div class="home-hr"></div>`:'')).join('')
      + `</div></div>`); }
  else if(d.upcoming){ mid.push(homeUpcoming(d.upcoming, d.upcomingTitle, d.upcomingNoHeader)); }
  else if(isPreview){ mid.push(`<div class="hc-block"><div class="home-empty">${d.subline || 'No live activities scheduled today.'}</div></div>`); }

  const backBtn = isPreview ? `<button class="date-back" data-home-day="${TODAY_KEY}" aria-label="Back to today">${I('arrow-left')}</button>` : '';
  const tip = d.tip ? `<div class="home-tip"><div class="tip-ico">${I('lightbulb')}</div>`
    + `<div class="tip-text"><div class="tip-h">Did you know?</div>`
    + `<div class="tip-b">Taking the stairs rather than the elevator strengthens your heart.</div></div></div>` : '';
  const wk = d.workouts;

  let card1 = `<div class="home-card"><div class="hc-top">${homeDateStrip(d)}`
    + `<div class="hc-datebar">${backBtn}<span>${d.dateFull}</span></div></div>`;
  if(mid.length){ card1 += `<div class="home-hr flush"></div><div class="hc-mid">${mid.join('<div class="home-hr"></div>')}</div>`; }
  card1 += tip + `</div>`;

  const today = HOME_DAYS[TODAY_KEY];   // heading always reflects today, not the previewed day
  return `<div class="home-title">`
      + `<div class="home-crumb">${I('house')}<span>Home</span></div>`
      + `<div class="home-heading"><div class="home-greeting">${today.eyebrow}</div>`
        + `<h1 class="home-h1">${today.headline}</h1></div></div>`
    + card1
    + `<div class="home-card wk-card-wrap">`
      + `<div class="hc-block wk-head"><h3 class="wk-title">Workouts</h3>${streakBadge(wk.streak)}</div>`
      + `<div class="hc-block"><div class="wk-row">`
        + wkCol('Group Workout','30 mins',wk.group.c,wk.group.btn,wk.group.style)
        + wkCol('Solo Workout','15+ mins',wk.solo.c,wk.solo.btn,wk.solo.style)
      + `</div></div>`
    + `</div>`;
}

/* ----- Video call flow builders ----- */
function vcLobby(){
  return `<div class="vc vc-lobby">`
    + `<div class="vc-preview"><img class="vc-photo" src="${IMG_PATIENT}" alt=""><div class="vc-avatar"><div class="vc-avatar-circle">You</div></div></div>`
    + `<div class="vc-precontrols">`
      + `<div class="vc-ctrl"><button class="vc-ctrl-btn" data-vc-toggle="mic">${I('mic')}</button><span class="vc-ctrl-label">Mute</span></div>`
      + `<div class="vc-ctrl"><button class="vc-ctrl-btn" data-vc-toggle="cam">${I('video')}</button><span class="vc-ctrl-label">Disable Cam</span></div>`
    + `</div>`
    + `<div class="vc-meta"><div class="vc-meta-title">Call with Coach Tanya</div>`
      + `<div class="vc-meta-sub">${I('repeat-2')}Tue, 2:30pm • 30 min</div></div>`
    + `<button class="vc-join" data-vc="join">${I('smartphone')}Join Call</button>`
    + `<button class="vc-back" data-vc="back">or go back to the previous screen</button>`
    + `</div>`;
}
function vcCall(){
  return `<div class="vc vc-call">`
    + `<div class="vc-remote">`
      + `<img class="vc-photo" src="${IMG_COACH}" alt="">`
      + `<button class="vc-flip">${I('video')}</button>`
      + `<div class="vc-remote-scrim"></div>`
      + `<div class="vc-remote-name">Coach Tanya</div>`
    + `</div>`
    + `<div class="vc-pip"><img class="vc-photo" src="${IMG_PATIENT}" alt=""><div class="vc-avatar"><div class="vc-avatar-circle">You</div></div></div>`
    + `<div class="vc-controlbar">`
      + `<div class="vc-ctrl"><button class="vc-ctrl-btn" data-vc-toggle="mic">${I('mic')}</button><span class="vc-ctrl-label">Mute</span></div>`
      + `<div class="vc-ctrl"><button class="vc-ctrl-btn" data-vc-toggle="cam">${I('video')}</button><span class="vc-ctrl-label">Disable Cam</span></div>`
      + `<div class="vc-ctrl"><button class="vc-ctrl-btn red" data-vc="leave">${I('phone-off')}</button><span class="vc-ctrl-label">Leave</span></div>`
    + `</div>`
    + `</div>`;
}
function vcSummary(){
  return `<div class="sum-head"><h1 class="sum-h1">Call Summary</h1><p class="sum-sub">View notes from your call</p></div>`
    + `<div class="sum-card">`
      + `<div class="sum-row"><span class="sum-label">Activity Type</span><span class="sum-badge">${I('smartphone')}Coach 1:1</span></div>`
      + `<div class="sum-row"><span class="sum-label">Date</span><span class="sum-value">May 19, 2026</span></div>`
      + `<div class="sum-row"><span class="sum-label">Time</span><span class="sum-value">2:30:00pm - 3:01:29pm</span></div>`
      + `<div class="sum-row"><span class="sum-label">Duration</span><span class="sum-value">31:29</span></div>`
      + `<div class="sum-row"><span class="sum-label">Health Coach</span><span class="sum-value">Coach Tanya</span></div>`
      + `<div class="sum-div"></div>`
      + `<div class="sum-notes"><div class="sum-notes-h">Visit Notes</div>`

}

/* ----- Coach Kai chat (bottom sheet opened by the tab-bar FAB) ----- */
function kaiGreetingHTML(){
  return `<div class="kai-ai"><div class="kai-meta"><span class="kai-name">AI Coach Kai</span><span class="kai-time">Just now</span></div>`
    + `<div class="kai-text">Good afternoon! How can I help you today?</div></div>`;

function schSheetHTML(){
  return `<div class="sheet-overlay" id="sch-sheet"><div class="sheet">`
    + `<div class="sheet-grab"></div>`
    + `<div class="sheet-head"><div class="sheet-title sch-eyebrow">Scheduling</div>`

    + `<div class="sch-body"></div>`

/* ----- Workouts tab (index) ----- */
function wkoCard(icon, title, sub, pills, btn, rings, count, attr){
  let r=''; for(let i=0;i<rings;i++) r+=`<span class="wko-ring"></span>`;
  return `<div class="wko-card"><div class="wko-card-body">`
    + `<div class="wko-chip">${I(icon)}</div>`
    + `<div class="wko-cg"><div class="wko-ct">${title}</div><div class="wko-cs">${sub}</div></div>`
    + `<div class="wko-pills">${pills}</div>`
    + `<button class="wko-btn"${attr}>${btn}</button>`
    + `</div>`
    + `<div class="wko-foot"><span class="wko-foot-label">Completed this week:</span>`
      + `<span class="wko-rings">${r}</span><span class="wko-count">${count}</span></div>`
    + `</div>`;
}
function wkoMain(){
  return `<div class="wko-title">`
      + `<div class="wko-eyebrow">${I('dumbbell')}<span>Workouts</span></div>`
      + `<div class="wko-head"><h1 class="wko-h1">Time to get moving.</h1>`
        + `<p class="wko-sub">Choose a solo workout or complete your weekly group workout.</p></div>`
    + `</div>`
    + wkoCard('person-standing','Solo Workouts','Complete an individual workout suggested by your Health Coach on your own schedule.',
        `<span class="wko-pill">15+ mins</span><span class="wko-pilltext">min. 2x per week</span>`, 'Start', 2, '0/2', ' data-solo="duration"')
    + wkoCard('users-round','Group Workout','Complete a group workout led by your Health Coach.',
        `<span class="wko-pill">30 mins</span>`, 'Schedule', 1, '0/1', ' data-sch-open="workout"');
}

/* ----- Library tab builders ----- */
function libRing(pct){
  const r = 7.11111, c = 2*Math.PI*r, off = c * (1 - pct/100);
  return `<svg class="lib-ring" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="${r}" stroke="#D6D3D1" stroke-width="1.5"/>`
    + `<circle cx="8" cy="8" r="${r}" stroke="#6497CD" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 8 8)"/></svg>`;
}
function libResource(o){

function libUpdateFilters(sheet){
  if(!sheet) return;
  sheet.querySelectorAll('.lib-fgroup').forEach(g=>{
    const badge = g.querySelector('.lib-fcount'); if(!badge) return;
    if(g.querySelector('[data-lib-radio]')){ badge.classList.remove('show'); return; }
    const n = g.querySelectorAll('.lib-opt.on').length;
    if(n>0){ badge.textContent = n; badge.classList.add('show'); } else badge.classList.remove('show');
  });
  const apply = sheet.querySelector('.lib-fapply');
  if(apply){
    // "Clear Filters" only shows when filters are already applied and unchanged; otherwise "Apply Filters"
    const showClear = sheet.dataset.applied === '1' && sheet.dataset.dirty !== '1';
    apply.textContent = showClear ? 'Clear Filters' : 'Apply Filters';
    apply.classList.toggle('clear', showClear);
  }
}
function libSyncMain(screen){
  if(!screen) return;
  const sheet = screen.querySelector('.lib-sheet');
  const n = sheet ? sheet.querySelectorAll('[data-lib-opt].on:not([data-lib-radio])').length : 0;
  const badge = screen.querySelector('.lib-search-count');
  const applied = screen.querySelector('.lib-applied');
  if(badge){ badge.textContent = n; badge.classList.toggle('show', n>0); }
  if(applied) applied.classList.toggle('show', n>0);
}

function statusBarHTML(dark){
  const c = dark ? '#fff' : '#000';
  return `<div class="status-bar${dark?' dark':''}">`
    + `<div class="time" style="color:${c};">10:30</div>`
    + `<div class="status-icons">`
    + `<svg width="19" height="13" viewBox="0 0 19 13" fill="${c}"><rect x="0" y="8" width="3" height="5" rx="1"/><rect x="5" y="5.5" width="3" height="7.5" rx="1"/><rect x="10" y="3" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="13" rx="1"/></svg>`
    + `<svg width="18" height="13" viewBox="0 0 18 13" fill="none"><path d="M9 11.5a1.4 1.4 0 1 0 0-2.8 1.4 1.4 0 0 0 0 2.8Z" fill="${c}"/><path d="M3.2 6.4a8 8 0 0 1 11.6 0" stroke="${c}" stroke-width="1.6" stroke-linecap="round"/><path d="M5.6 8.7a4.6 4.6 0 0 1 6.8 0" stroke="${c}" stroke-width="1.6" stroke-linecap="round"/></svg>`
    + `<svg width="28" height="13" viewBox="0 0 28 13" fill="none"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="${c}" stroke-opacity="0.4"/><rect x="2" y="2" width="19" height="9" rx="2" fill="${c}"/><path d="M25 4.5v4a2 2 0 0 0 1.2-1.84V6.34A2 2 0 0 0 25 4.5Z" fill="${c}" fill-opacity="0.5"/></svg>`
    + `</div></div>`;

/* Native app top bar (Setup hub) — centered wordmark + info icon */
const appBar = `<header class="app-bar"><span class="app-bar-side"></span><div class="app-bar-logo">${LOGO}</div><button class="app-bar-info" aria-label="Info">${I('info')}</button></header>`;

/* Primary App bottom tab bar — Home / Workouts / Progress / Library + Coach Kai FAB */
function tabBarHTML(active){
  const items = [['home','house','Home'],['workouts','person-standing','Workouts'],['progress','trending-up','Progress'],['library','library-big','Library']];
  return `<nav class="tab-bar"><div class="tab-items">`
    + items.map(([k,ic,lab])=>`<button class="tab-item${active===k?' active':''}" data-tab="${k}">${I(ic)}<span>${lab}</span></button>`).join('')
    + `</div>`
    + `<button class="tab-fab" aria-label="Coach Kai">${I('bot-message-square')}</button>`
    + `</nav>`;
}

/* Safari-style browser chrome — shown on web onboarding screens to signal
   "this is a website". Native app (Part B) screens omit it. */
const WEB_URL = 'relevais.health';
const browserBar = `
  <div class="browser-bar">
    <div class="url-pill">
      <span class="bb-lock">${I('lock')}</span>
      <span class="url">${WEB_URL}</span>
    </div>
  </div>`;

function footerHTML(s, idx){
  if(s.confirm || s.milestone || s.splash || s.solo || s.next==='Get started'){
    const gate = s.lockNext ? ' js-gate' : '';
    const dis = s.lockNext ? ' disabled' : '';
    return `<div class="footer-nav confirm-footer"><button class="btn btn-full${gate}" data-next${dis}>${s.next} ${I('arrow-right')}</button></div>`;
  }
  const disabled = idx===0;
  const gate = s.lockNext ? ' js-gate' : '';
  const dis = s.lockNext ? ' disabled' : '';
  return `<div class="footer-nav">`
    + `<button class="btn btn-back"${disabled?' disabled':' data-back'}>${I('arrow-left')} Back</button>`
    + `<button class="btn btn-next${gate}" data-next${dis}>${s.next} ${I('arrow-right')}</button></div>`;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = screens.map((s,idx)=>{
    if(s.video || s.bleed){
      const dark = !!s.video;
      const whiteStatus = s.video && !s.solo;   // call video is dark; the solo workout video is light
      const landscape = s.solo==='countdown' || s.solo==='video';   // rotated screens hide the portrait status bar
      return `<div class="screen${dark?' video':''}${idx===0?' active':''}" data-index="${idx}">`
        + (landscape ? '' : statusBarHTML(whiteStatus))
        + s.main
        + `<div class="home-indicator"></div>`
        + `</div>`;
    }
    let bodyInner;
    if(s.home){
      bodyInner = `<div class="home">${s.main}</div>`;
    } else if(s.summary){
      bodyInner = `<div class="summary-wrap">${s.main}</div>`;
    } else if(s.workouts){
      bodyInner = `<div class="wko">${s.main}</div>`;
    } else if(s.library || s.libArticle){
      bodyInner = `<div class="lib">${s.main}</div>`;
    } else if(typeof s.solo === 'string'){
      bodyInner = s.main;   // workout solo-flow builders include their own .solo wrapper + action buttons
    } else if(s.hub){
      bodyInner = `<div class="surface" style="background:transparent;padding:0;">`
        + `<div class="main">${s.main}</div></div>`;
    } else if(s.confirm || s.milestone || s.splash){
      bodyInner = `<div class="surface" style="background:transparent;padding-top:0;">`
        + `<div class="main">${s.main}${footerHTML(s,idx)}</div></div>`;
    } else {
      const stepLabel = s.step ? `<div class="step-label">${s.step}</div>` : '';
      bodyInner = `<div class="surface">`
        + `<div class="page-title">${stepLabel}<h1 class="title">${s.title}</h1><p class="subtitle">${s.subtitle}</p></div>`
        + `<div class="main">${s.main}${footerHTML(s,idx)}</div>`
        + `</div>`;
    }
    const isWeb = s.app !== true;   // native app (Part B) screens set app:true
    const headerHTML = s.appbar
      ? appBar
      : `<header class="brand"><div class="logo">${LOGO}</div><div class="tagline">Guiding your recovery</div></header>`;
    return `<div class="screen${isWeb?' web':''}${idx===0?' active':''}" data-index="${idx}">`
      + statusBarHTML(false)
      + (isWeb ? browserBar : '')
      + (s.overlay || '')
      + `<div class="scroll"><div class="content">`
      + headerHTML
      + `<div class="body">${bodyInner}</div>`
      + `</div></div>`
      + ((s.home || s.summary || s.workouts || s.library || s.libArticle)
          ? tabBarHTML((s.library || s.libArticle) ? 'library' : (s.workouts ? 'workouts' : 'home')) : '')
      + `<div class="home-indicator"></div>`
      + `</div>`;
  }).join('');
  initInteractions();
}

/* ============================================================
   Interactivity
   ============================================================ */
let current = 0;
function show(idx){
  const all = document.querySelectorAll('.screen');
  if(idx<0 || idx>=all.length) return;
  const outgoing = all[current];   // clear any running solo-flow timers on the screen we're leaving
  if(outgoing._rotateT){ clearTimeout(outgoing._rotateT); outgoing._rotateT = null; }
  if(outgoing._cd){ clearInterval(outgoing._cd); outgoing._cd = null; }
  all[current].classList.remove('active');
  current = idx;
  all[current].classList.add('active');
  // reset scroll position
  const sc = all[current].querySelector('.scroll');
  if(sc) sc.scrollTop = 0;
  // iOS notification: stay hidden, then drop in after a short delay (text "arriving")
  const scr = all[current];
  const notif = scr.querySelector('.ios-notif');
  if(notif){
    notif.classList.remove('gone');     // reset if previously dismissed
    notif.style.visibility = 'hidden';
    setTimeout(()=>{
      if(!scr.classList.contains('active')) return;
      notif.style.visibility = 'visible';
      notif.style.animation = 'none'; void notif.offsetWidth; notif.style.animation = '';
    }, 1700);
  }
  // replay the subtle celebrate animation on the milestone / account-created screens
  const cel = scr.querySelector('.confirm');
  if(cel){ cel.classList.remove('celebrating'); void cel.offsetWidth; cel.classList.add('celebrating'); }
  const soloCel = scr.querySelector('.solo-party');   // replay the celebrate pop on the workout-complete screen
  if(soloCel){ soloCel.classList.remove('celebrating'); void soloCel.offsetWidth; soloCel.classList.add('celebrating'); }
  // iOS permission alerts: notifications → (1s) → health; each confirm removes its Remaining-needs row
  runHubAlerts(scr);
  // reset the smartwatch sync sheet on (re)entry
  const syncSheet = scr.querySelector('#sync-sheet');
  if(syncSheet){ clearSyncTimers(syncSheet); syncSheet.classList.remove('show'); syncSheet.dataset.synced='0'; }
  // reset scheduling (un-ring, restore card, hide Upcoming Schedule)
  if(scr.querySelector('#schedule-sheet')) resetSchedule(scr);
  const surveysSheet = scr.querySelector('#surveys-sheet');
  if(surveysSheet) surveysSheet.classList.remove('show');
  const schSheet = scr.querySelector('#sch-sheet');
  if(schSheet) schSheet.classList.remove('show');
  const kaiSheet = scr.querySelector('#kai-sheet');
  if(kaiSheet) kaiSheet.classList.remove('show');
  const libSheet = scr.querySelector('#lib-sheet');
  if(libSheet) libSheet.classList.remove('show');
  if(scr.querySelector('.home')) startCallCountdown(scr);   // Tue call card: Join Soon → Join Now after 3s
  const soloStep = screens[current] && screens[current].solo;   // solo-flow auto-advances
  if(soloStep==='rotate'){ scr._rotateT = setTimeout(()=>{ if(scr.classList.contains('active')) goToScreen(s=>s.solo==='countdown'); }, 2200); }
  else if(soloStep==='countdown'){ startCountdown(scr); }
  updateProtoNav();
}

/* Jump to the first screen matching a predicate (used by cross-screen buttons) */
function goToScreen(pred){ const i = screens.findIndex(pred); if(i>=0) show(i); }

/* Prototype section nav (desktop) — jump to the first screen of each section */
function sectionOf(s){ return s.primary ? 'primary' : (s.app ? 'inapp' : 'web'); }
function sectionStart(sec){
  if(sec==='web') return 0;
  return screens.findIndex(s => sectionOf(s) === sec);
}
function updateProtoNav(){
  const sec = sectionOf(screens[current]);
  document.querySelectorAll('.proto-nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.section === sec));
}
function initProtoNav(){
  document.querySelectorAll('.proto-nav button').forEach(btn=>{
    const start = sectionStart(btn.dataset.section);
    if(start < 0){ btn.disabled = true; return; }   // section not built yet
    btn.addEventListener('click', ()=> show(start));
  });
  updateProtoNav();
}

/* Remove one Remaining-needs card; once the section is empty, clear the whole section. */
function removeNeed(scr, key){
  const need = scr.querySelector('.need[data-need="'+key+'"]');
  if(need && !need.classList.contains('removed')){
    need.classList.add('removed');
    setTimeout(()=>{ need.style.display='none'; checkRemainingEmpty(scr); }, 260);
  }
}
function checkRemainingEmpty(scr){
  const needs = [...scr.querySelectorAll('#remaining-block .need')];
  const anyLeft = needs.some(n => n.style.display !== 'none' && !n.classList.contains('removed'));
  if(!anyLeft){
    const block = scr.querySelector('#remaining-block');
    if(block){ block.classList.add('removed'); setTimeout(()=>{ block.style.display='none'; }, 320); }
  }
}

/* Hub permission-alert sequence: notifications → (1s) → Apple Health.
   "Allow" removes that card; "Don't Allow" leaves it for the user to allow manually. */
function runHubAlerts(scr){
  const overlay = scr.querySelector('.ios-alert-overlay');
  if(!overlay) return;
  const titleEl = overlay.querySelector('.ios-alert-title');
  const bodyEl  = overlay.querySelector('.ios-alert-body');
  const alerts = [
    {need:'notifications', title:'&ldquo;Relevais&rdquo; Would Like to Send You Notifications', body:'Notifications may include alerts, sounds and icon badges. These can be configured in Settings.'},
    {need:'health', title:'&ldquo;Relevais&rdquo; would like access to your Apple Health Data.', body:'Notifications may include alerts, sounds and icon badges. These can be configured in Settings.'}
  ];
  let i = 0;
  function present(){
    if(i >= alerts.length) return;
    titleEl.innerHTML = alerts[i].title;
    bodyEl.innerHTML  = alerts[i].body;
    overlay.classList.add('show');
  }
  function respond(allowed){
    const a = alerts[i];
    overlay.classList.remove('show');
    if(allowed) removeNeed(scr, a.need);   // Allow removes the card; Don't Allow leaves it
    i++;
    if(i < alerts.length){ setTimeout(()=>{ if(scr.classList.contains('active')) present(); }, 1000); }
  }
  overlay.querySelectorAll('[data-alert]').forEach(btn=>{ btn.onclick = ()=> respond(btn.dataset.alert === 'allow'); });
  // reset on (re)entry: restore rows + section, hide overlay, replay from the start
  scr.querySelectorAll('.need').forEach(n=>{ n.classList.remove('removed'); n.style.display=''; });
  const block = scr.querySelector('#remaining-block');
  if(block){ block.classList.remove('removed'); block.style.display=''; }
  overlay.classList.remove('show');
  i = 0;
  setTimeout(()=>{ if(scr.classList.contains('active')) present(); }, 800);
}

/* Smartwatch sync bottom sheet: Sync → (spinner) → synced → close + remove row */
function clearSyncTimers(ov){ if(ov._t1) clearTimeout(ov._t1); if(ov._t2) clearTimeout(ov._t2); ov._t1=ov._t2=null; }
function openSyncSheet(scr){
  const ov = scr.querySelector('#sync-sheet'); if(!ov) return;
  clearSyncTimers(ov);
  const icon = ov.querySelector('.sheet-icon');
  const status = ov.querySelector('.sheet-status');
  const sub = ov.querySelector('.sheet-sub');
  ov.dataset.synced = '0';
  icon.innerHTML = '<div class="sheet-spinner">'+I('loader-circle')+'</div>';
  status.textContent = 'Syncing with smartwatch…';
  sub.textContent = 'This may take a moment.';
  ov.classList.add('show');
  ov._t1 = setTimeout(()=>{
    icon.innerHTML = '<div class="sheet-check">'+I('circle-check')+'</div>';
    status.textContent = 'Smartwatch synced.';
    sub.textContent = 'Data is now being tracked.';
    ov.dataset.synced = '1';
    ov._t2 = setTimeout(()=> closeSyncSheet(scr), 1600);   // auto-dismiss after success
  }, 2000);
}
function closeSyncSheet(scr){
  const ov = scr.querySelector('#sync-sheet'); if(!ov) return;
  clearSyncTimers(ov);
  ov.classList.remove('show');
  if(ov.dataset.synced === '1'){   // sync complete → remove the smartwatch card (clears section if last)
    removeNeed(scr, 'smartwatch');

}

/* Solo workout: 5-second countdown, then auto-advance into the video */
function startCountdown(scr){
  const numEl = scr.querySelector('.solo-cd-num'); if(!numEl) return;
  const arc = scr.querySelector('.cd-arc'); const C = 276.46;
  let n = 5; scr._cdPaused = false;
  numEl.textContent = n; if(arc) arc.style.strokeDashoffset = C;
  if(scr._cd) clearInterval(scr._cd);
  scr._cd = setInterval(()=>{
    if(scr._cdPaused) return;
    n--;
    if(arc) arc.style.strokeDashoffset = C * (Math.max(0,n) / 5);
    if(n <= 0){ clearInterval(scr._cd); scr._cd = null; if(scr.classList.contains('active')) goToScreen(s=>s.solo==='video'); return; }
    numEl.textContent = n;
  }, 1000);
}
function kaiSend(scr, text){
  const msgs = scr && scr.querySelector('#kai-msgs'); if(!msgs || !text) return;
  const chips = scr.querySelector('#kai-chips'); if(chips) chips.style.display = 'none';
  msgs.insertAdjacentHTML('beforeend', `<div class="kai-user"><div class="kai-meta"><span class="kai-name">You</span><span class="kai-time">Just now</span></div><div class="kai-bubble">${text}</div></div>`);
  msgs.scrollTop = msgs.scrollHeight;
  if(msgs._t) clearTimeout(msgs._t);
  msgs._t = setTimeout(()=>{
    msgs.insertAdjacentHTML('beforeend',
      `<div class="kai-ai"><div class="kai-meta"><span class="kai-name">AI Coach Kai</span><span class="kai-time">Just now</span></div>`
      + `<div class="kai-reply"><p>${KAI_REPLY}</p><span class="kai-link">${I('external-link')}Link</span></div>`
      + `<div class="kai-fb">${I('thumbs-up')}${I('thumbs-down')}</div></div>`);
    msgs.scrollTop = msgs.scrollHeight;
  }, 700);
}

function setReveal(id, open){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open', open);
}

function initInteractions(){
  // Option groups (radio/checkbox)
  document.querySelectorAll('.opt-group').forEach(grp=>{
    const multi = grp.dataset.mode === 'multi';
    grp.querySelectorAll('.option').forEach(option=>{
      option.addEventListener('click', ()=>{
        if(multi){
          // exclusive checkbox handling
          if(option.hasAttribute('data-exclusive')){
            const willSelect = !option.classList.contains('selected');
            grp.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
            option.classList.toggle('selected', willSelect);
          } else {
            option.classList.toggle('selected');
            const ex = grp.querySelector('.option[data-exclusive]');
            if(ex) ex.classList.remove('selected');
          }
          // checkbox-driven reveals (e.g. loaner-phone alert)
          if(option.dataset.reveal){
            option.dataset.reveal.split(' ').forEach(id=>setReveal(id, option.classList.contains('selected')));
          }
        } else {
          // single select: clear all reveals owned by this group, then select
          grp.querySelectorAll('.option[data-reveal]').forEach(o=>{
            o.dataset.reveal.split(' ').forEach(id=>setReveal(id,false));
          });
          grp.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
          option.classList.add('selected');
          if(option.dataset.reveal){
            option.dataset.reveal.split(' ').forEach(id=>setReveal(id,true));
          }
        }
        // gate the screen's Next button on an "agree"-style checkbox
        if(option.hasAttribute('data-gate')){
          const scr = option.closest('.screen');
          const gateBtn = scr && scr.querySelector('.js-gate');
          if(gateBtn) gateBtn.disabled = !option.classList.contains('selected');
        }
      });
    });
  });

  // Selects: colour + change-driven reveals (smartwatch type -> model)
  document.querySelectorAll('select.input').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      sel.classList.toggle('has-value', !!sel.value);
      if(sel.dataset.reveal){
        setReveal(sel.dataset.reveal, !!sel.value);
        // update dependent model label e.g. "What model of Apple Watch?"
        const target = document.getElementById(sel.dataset.reveal);
        if(target){
          const lbl = target.querySelector('[data-model-label]');
          if(lbl) lbl.textContent = `What model of ${sel.value}?`;
        }
      }
    });
  });

  // Sliders
  document.querySelectorAll('.slider').forEach(sl=>{
    const input = sl.querySelector('input[type=range]');
    const val = sl.querySelector('.val');
    const update = ()=>{
      const min=+input.min, max=+input.max, v=+input.value;
      const pct = ((v-min)/(max-min))*100;
      // keep thumb pill within the track bounds
      const clamped = Math.max(7, Math.min(93, pct));
      sl.style.setProperty('--pct', clamped + '%');
      sl.querySelector('.slider-fill').style.width = pct + '%';
      val.textContent = v;
    };
    input.addEventListener('input', update);
    update();
  });

  // Solo duration slider — 3 stops (15 / 20 / 30 min); updates thumb, big number + button label
  document.querySelectorAll('.dslider').forEach(sl=>{
    const input = sl.querySelector('input[type=range]');
    const scr = sl.closest('.screen');
    const STEPS = [15,20,30];
    const upd = ()=>{
      const i = Math.max(0, Math.min(STEPS.length-1, +input.value));
      const mins = STEPS[i];
      const pct = i/(STEPS.length-1)*100;
      const clamped = Math.max(11, Math.min(89, pct));
      sl.style.setProperty('--dpct', clamped + '%');
      sl.querySelector('.dslider-fill').style.width = clamped + '%';
      sl.querySelector('.dval').textContent = mins;
      const n = scr.querySelector('.solo-num'); if(n) n.textContent = mins;
      const s = scr.querySelector('.solo-selnum'); if(s) s.textContent = mins;
    };
    input.addEventListener('input', upd); upd();
  });

  // Solo "how hard was it?" rating slider → highlight the matching emoji + shift color green→red
  const RATE_SCALE = ['#5fa33f','#c9a90d','#f0a110','#e2703a','#df6150'];
  document.querySelectorAll('[data-solo-rating]').forEach(inp=>{
    const scr = inp.closest('.screen');
    const fill = inp.closest('.slider') && inp.closest('.slider').querySelector('.slider-fill');
    const sync = ()=>{
      const v=+inp.value; const fi=Math.min(4, Math.floor((v-1)/2)); const color=RATE_SCALE[fi];
      scr.querySelectorAll('.solo-face').forEach((f,i)=>{ const on=i===fi; f.classList.toggle('sel', on); f.style.color = on ? color : ''; });
      if(fill) fill.style.background = color;
    };
    inp.addEventListener('input', sync); sync();
  });

  // Navigation
  document.querySelectorAll('[data-next]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(current === screens.length-1){ show(0); }   // "Get started" loops to start
      else show(current+1);
    });
  });
  document.querySelectorAll('[data-back]').forEach(btn=>{
    btn.addEventListener('click', ()=> show(current-1));
  });

  // Keyboard arrows for presenting (ignored while typing in a field)
  document.addEventListener('keydown', (e)=>{
    if(e.target && e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight') show(current+1);
    if(e.key==='ArrowLeft') show(current-1);
  });
  // Enter in the Coach Kai field sends the message
  document.getElementById('app').addEventListener('keydown', (e)=>{
    if(e.target && e.target.classList && e.target.classList.contains('kai-field') && e.key==='Enter'){
      e.preventDefault();
      const scr = e.target.closest('.screen');
      if(e.target.value.trim()){ kaiSend(scr, e.target.value.trim()); e.target.value=''; }
    }
  });

  initProtoNav();
  initCodeInputs();
  initKeyboard();

  // Collapsible sections (Remaining needs / Upcoming Schedule) — chevron toggles content
  document.querySelectorAll('.section-head').forEach(h=>{
    h.addEventListener('click', ()=>{
      h.classList.toggle('collapsed');
      const body = h.nextElementSibling;
      if(body && body.classList.contains('section-body')) body.classList.toggle('hidden');
    });
  });

  // Smartwatch "Sync" opens the bottom sheet; X / Cancel close it
  document.querySelectorAll('.need[data-need="smartwatch"] .pill').forEach(btn=>{
    btn.addEventListener('click', ()=> openSyncSheet(btn.closest('.screen')));
  });
  // Notifications / Apple Health "Allow" (manual) removes that card
  document.querySelectorAll('.need[data-need="notifications"] .pill, .need[data-need="health"] .pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{ const n=btn.closest('.need'); removeNeed(btn.closest('.screen'), n.dataset.need); });
  });
  document.querySelectorAll('[data-sheet-close]').forEach(btn=>{
    btn.addEventListener('click', ()=> closeSyncSheet(btn.closest('.screen')));
  });

  // Scheduling (delegated — Schedule/Reschedule buttons get swapped in dynamically)
  document.getElementById('app').addEventListener('click', (e)=>{
    // Home date strip: tapping a day re-renders the home for that day's state
    const hday = e.target.closest('[data-home-day]');
    if(hday){
      const key = hday.dataset.homeDay;
      const scr = hday.closest('.screen');           // capture before re-render detaches hday
      const home = hday.closest('.home');
      if(home) home.innerHTML = renderHome(key);
      const fab = scr && scr.querySelector('.tab-fab');
      if(fab) fab.classList.toggle('gold', !!(HOME_DAYS[key] && HOME_DAYS[key].fabGold));
      startCallCountdown(scr);   // re-render restarts the Join Soon → Join Now countdown when viewing today
      return;
    }
    // Home Schedule / Reschedule buttons open the scheduling wizard
    const schStart = e.target.closest('.home .act-btn, .home .up-link');
    if(schStart){
      const label = schStart.textContent.trim();
      if(label==='Schedule' || label==='Reschedule'){
        const row = schStart.closest('.act-item, .up-item');
        const nameEl = row && row.querySelector('.act-h, .up-name');
        const name = nameEl ? nameEl.textContent : '';
        const act = /Learning/.test(name) ? 'learning' : /Call|Coach/.test(name) ? 'call' : 'workout';
        openSchedWizard(schStart.closest('.screen'), act, label==='Reschedule' ? 'reschedule' : 'schedule');
        return;
      }
    }
    // Workouts "Schedule" button opens the scheduling wizard for that activity
    const schOpen = e.target.closest('[data-sch-open]');
    if(schOpen){ openSchedWizard(schOpen.closest('.screen'), schOpen.dataset.schOpen, 'schedule'); return; }
    // Solo workout flow: Start → duration → prep → video → complete → finish
    const solo = e.target.closest('[data-solo]');
    if(solo){
      const step = solo.dataset.solo;
      if(step==='cancel'){ goToScreen(s=>s.workouts); }
      else if(step==='finish'){
        const wkoScreen = [...document.querySelectorAll('.screen')].find(s=>s.querySelector('.wko'));
        if(wkoScreen){
          const card = wkoScreen.querySelector('.wko-card');
          const ring = card.querySelector('.wko-ring:not(.done)');
          if(ring){ ring.classList.add('done'); ring.innerHTML = I('check',3); }
          const cnt = card.querySelector('.wko-count');
          if(cnt) cnt.textContent = card.querySelectorAll('.wko-ring.done').length + '/' + card.querySelectorAll('.wko-ring').length;
        }
        goToScreen(s=>s.workouts);
      }
      else { goToScreen(s=>s.solo===step); }
      return;
    }
    const sv = e.target.closest('[data-solo-video]');
    if(sv){ if(sv.dataset.soloVideo==='play'){ const paused=sv.classList.toggle('paused'); sv.innerHTML=I(paused?'play':'pause'); } return; }
    const soloBack = e.target.closest('[data-solo-back]');
    if(soloBack){ goToScreen(s=>s.solo==='prep'); return; }
    const cdBtn = e.target.closest('[data-solo-cd]');
    if(cdBtn){ const scr=cdBtn.closest('.screen'); scr._cdPaused=!scr._cdPaused; cdBtn.innerHTML = I(scr._cdPaused?'play':'pause') + (scr._cdPaused?'Resume countdown':'Pause countdown'); return; }
    const face = e.target.closest('[data-solo-face]');
    if(face){ const scr=face.closest('.screen'); const faces=[...scr.querySelectorAll('.solo-face')]; const fi=faces.indexOf(face); const inp=scr.querySelector('[data-solo-rating]'); if(inp){ inp.value=[2,4,6,8,10][fi]; inp.dispatchEvent(new Event('input',{bubbles:true})); } return; }
    // Scheduling wizard step controls
    const schD = e.target.closest('[data-sch-date]');
    if(schD){ schState.date=+schD.dataset.schDate; schState.step='time'; renderSchBody(schD.closest('.screen')); return; }
    const schT = e.target.closest('[data-sch-time]');
    if(schT){ schState.time=+schT.dataset.schTime; schState.step='confirm'; renderSchBody(schT.closest('.screen')); return; }
    const schBk = e.target.closest('[data-sch-back]');
    if(schBk){ schState.step=schBk.dataset.schBack; renderSchBody(schBk.closest('.screen')); return; }
    const schCf = e.target.closest('[data-sch-confirm]');
    if(schCf){ const scr=schCf.closest('.screen'); schState.step='done'; renderSchBody(scr); if(scr.querySelector('#schedule-slot')) bookOnboardingCall(scr); return; }
    const schCl = e.target.closest('[data-sch-close]');
    if(schCl){ closeSchedWizard(schCl.closest('.screen')); return; }
    // Video call: "Join Now" (home) → lobby; lobby/in-call buttons drive the flow
    if(e.target.closest('.home .cc-join.now, .home .up-link.now')){ goToScreen(s=>s.videoStep==='lobby'); return; }
    // Onboarding hub: booked "Join Now" → same coach-call flow (lobby)
    if(e.target.closest('[data-join-call]')){ goToScreen(s=>s.videoStep==='lobby'); return; }
    // Call Summary "Done" → Primary App Home
    if(e.target.closest('[data-sum-done]')){ goToScreen(s=>s.home); return; }
    const vcBtn = e.target.closest('[data-vc]');
    if(vcBtn){
      const a = vcBtn.dataset.vc;
      if(a==='join') goToScreen(s=>s.videoStep==='incall');
      else if(a==='leave') goToScreen(s=>s.summary);
      else goToScreen(s=>s.home);                 // 'back'
      return;
    }
    const vcTog = e.target.closest('[data-vc-toggle]');
    if(vcTog){
      const kind = vcTog.dataset.vcToggle;
      const off = vcTog.classList.toggle('off');
      const lbl = vcTog.closest('.vc-ctrl').querySelector('.vc-ctrl-label');
      if(kind==='mic'){ vcTog.innerHTML = I(off?'mic-off':'mic'); if(lbl) lbl.textContent = off?'Unmute':'Mute'; }
      else {
        vcTog.innerHTML = I(off?'video-off':'video'); if(lbl) lbl.textContent = off?'Enable Cam':'Disable Cam';
        const scr = vcTog.closest('.screen');   // cam off → self-view shows the "You" avatar instead of the photo
        if(scr) scr.querySelectorAll('.vc-pip, .vc-preview').forEach(el=> el.classList.toggle('camoff', off));
      }
      return;
    }
    // Coach Kai chat: FAB opens the sheet; chips / send / close drive it
    if(e.target.closest('.tab-fab')){ openKai(e.target.closest('.screen')); return; }
    const kaiCl = e.target.closest('[data-kai-close]');
    if(kaiCl){ closeKai(kaiCl.closest('.screen')); return; }
    const kaiChip = e.target.closest('[data-kai-send]');
    if(kaiChip){ kaiSend(kaiChip.closest('.screen'), kaiChip.dataset.kaiSend); return; }
    const kaiInp = e.target.closest('[data-kai-input-send]');
    if(kaiInp){ const scr=kaiInp.closest('.screen'); const f=scr.querySelector('.kai-field'); if(f && f.value.trim()){ kaiSend(scr, f.value.trim()); f.value=''; } return; }
    // Bottom tab navigation + "Back to Library" (Home / Workouts / Library built; Progress not yet)
    const tab = e.target.closest('[data-tab]');
    if(tab){
      const k = tab.dataset.tab;
      if(k==='home') goToScreen(s=>s.home);
      else if(k==='workouts') goToScreen(s=>s.workouts);
      else if(k==='library') goToScreen(s=>s.library);
      return;
    }
    // Library: opening a resource → article detail
    const libOpen = e.target.closest('[data-lib-open]');
    if(libOpen){ goToScreen(s=>s.libArticle); return; }
    // Library search & filter sheet
    const libFilter = e.target.closest('[data-lib-filter]');
    if(libFilter){
      const ov=libFilter.closest('.screen').querySelector('#lib-sheet');
      if(ov){
        const sheet=ov.querySelector('.lib-sheet');
        if(sheet){ sheet.dataset.dirty='0'; sheet._snap=[...sheet.querySelectorAll('[data-lib-opt]')].map(o=>o.classList.contains('on')); }
        ov.classList.add('show'); libUpdateFilters(sheet);
      }
      return;
    }
    const libClearMain = e.target.closest('[data-lib-clear-main]');
    if(libClearMain){
      const screen = libClearMain.closest('.screen');
      const sheet = screen.querySelector('.lib-sheet');
      if(sheet){ sheet.querySelectorAll('[data-lib-opt].on:not([data-lib-radio])').forEach(o=>o.classList.remove('on')); sheet.dataset.applied='0'; sheet.dataset.dirty='0'; libUpdateFilters(sheet); }
      libSyncMain(screen);
      return;
    }
    const libApply = e.target.closest('[data-lib-apply]');
    if(libApply){
      const sheet = libApply.closest('.lib-sheet');
      const screen = libApply.closest('.screen');
      const isClear = libApply.classList.contains('clear');
      if(isClear){
        // Clear Filters: wipe selections, un-apply — but keep the sheet open
        sheet.querySelectorAll('[data-lib-opt].on:not([data-lib-radio])').forEach(o=>o.classList.remove('on'));
        sheet.dataset.applied='0';
        sheet._snap=[...sheet.querySelectorAll('[data-lib-opt]')].map(o=>o.classList.contains('on'));
      } else {
        // Apply Filters: commit current selection and close to show results
        sheet.dataset.applied = sheet.querySelector('[data-lib-opt].on:not([data-lib-radio])') ? '1' : '0';
      }
      sheet.dataset.dirty='0';
      libUpdateFilters(sheet);
      libSyncMain(screen);
      if(!isClear){ const ov=screen.querySelector('#lib-sheet'); if(ov) ov.classList.remove('show'); }
      return;
    }
    const libSheetX = e.target.closest('[data-lib-sheet-close]');
    if(libSheetX){
      // Cancel: discard uncommitted changes, revert to last-applied selection
      const screen=libSheetX.closest('.screen');
      const sheet=screen.querySelector('.lib-sheet');
      if(sheet){ const opts=[...sheet.querySelectorAll('[data-lib-opt]')]; if(sheet._snap) opts.forEach((o,i)=>o.classList.toggle('on', !!sheet._snap[i])); sheet.dataset.dirty='0'; libUpdateFilters(sheet); }
      const ov=screen.querySelector('#lib-sheet'); if(ov) ov.classList.remove('show');
      return;
    }
    const libFhead = e.target.closest('.lib-fhead');
    if(libFhead){ libFhead.closest('.lib-fgroup').classList.toggle('collapsed'); return; }
    const libOptEl = e.target.closest('[data-lib-opt]');
    if(libOptEl){
      if(libOptEl.dataset.libRadio){ libOptEl.parentElement.querySelectorAll('[data-lib-radio="'+libOptEl.dataset.libRadio+'"]').forEach(o=>o.classList.remove('on')); libOptEl.classList.add('on'); }
      else { libOptEl.classList.toggle('on'); }
      const sheet=libOptEl.closest('.lib-sheet'); if(sheet) sheet.dataset.dirty='1';
      libUpdateFilters(sheet);
      return;
    }
    const open = e.target.closest('[data-open-schedule]');
    if(open){ openScheduleSheet(open.closest('.screen')); return; }
    const date = e.target.closest('[data-date]');
    if(date){ scheduleDate(date.closest('.screen'), +date.dataset.dateIdx, date.dataset.dateShort, date.dataset.dateFull); return; }
    const close = e.target.closest('[data-sched-close]');
    if(close){ closeScheduleSheet(close.closest('.screen')); return; }
    const surveys = e.target.closest('[data-open-surveys]');
    if(surveys){ openSurveysSheet(surveys.closest('.screen')); return; }
    const surveysClose = e.target.closest('[data-surveys-close]');
    if(surveysClose){ closeSurveysSheet(surveysClose.closest('.screen')); return; }
  });
}

/* Simulated iOS software keyboard — desktop only (a real phone shows its own).
   Slides up when an input is focused; keys type into the focused field. */
function initKeyboard(){
  const app = document.getElementById('app');
  if(app.querySelector('.ios-kb')) return;
  const isMobile = ()=> window.matchMedia('(max-width:460px)').matches;
  let activeField=null, shifted=false, mode='qwerty', hideT=null;
  const kb = document.createElement('div');
  kb.className = 'ios-kb';
  app.appendChild(kb);

  const Q=['qwertyuiop','asdfghjkl','zxcvbnm'];
  const S=['1234567890','-/:;()$&@"','.,?!\''];

  function keyEl(label, cls, data){
    const b=document.createElement('div');
    b.className='kb-key'+(cls?' '+cls:'');
    b.textContent=label;
    b.dataset.k = (data!==undefined?data:label);
    b.addEventListener('mousedown', e=> e.preventDefault());   // keep field focused
    b.addEventListener('click', ()=> press(b.dataset.k));
    return b;
  }
  function row(){ const r=document.createElement('div'); r.className='kb-row'; return r; }

  function build(){
    kb.innerHTML='';
    kb.classList.toggle('numeric', mode==='numeric');
    if(mode==='numeric'){
      [['1','2','3'],['4','5','6'],['7','8','9'],['blank','0','del']].forEach(rr=>{
        const r=row();
        rr.forEach(k=>{
          if(k==='blank') r.appendChild(keyEl('','blank','noop'));
          else if(k==='del') r.appendChild(keyEl('⌫','','del'));
          else r.appendChild(keyEl(k,'',k));
        });
        kb.appendChild(r);
      });
      return;
    }
    const sym = mode==='symbols';
    const set = sym ? S : Q;
    const cap = c => (!sym && shifted) ? c.toUpperCase() : c;
    let r=row(); set[0].split('').forEach(c=> r.appendChild(keyEl(cap(c),'',c))); kb.appendChild(r);
    r=row(); set[1].split('').forEach(c=> r.appendChild(keyEl(cap(c),'',c))); kb.appendChild(r);
    r=row();
    r.appendChild(keyEl(sym?'#+=':'⇧','special wide','shift'));
    set[2].split('').forEach(c=> r.appendChild(keyEl(cap(c),'',c)));
    r.appendChild(keyEl('⌫','special wide','del'));
    kb.appendChild(r);
    r=row();
    r.appendChild(keyEl(sym?'ABC':'123','special','mode'));
    r.appendChild(keyEl('space','space',' '));
    r.appendChild(keyEl('return','return','return'));
    kb.appendChild(r);
  }

  function typeChar(ch){
    const el=activeField; if(!el) return;
    if(el.maxLength===1){ el.value=ch; el.dispatchEvent(new Event('input',{bubbles:true})); return; }
    const max = el.maxLength>0 ? el.maxLength : Infinity;
    if(el.value.length<max){ el.value+=ch; el.dispatchEvent(new Event('input',{bubbles:true})); }
  }
  function del(){
    const el=activeField; if(!el) return;
    if(el.maxLength===1 && el.value===''){
      const boxes=[...(el.closest('.code-boxes')?el.closest('.code-boxes').querySelectorAll('.code-box'):[])];
      const idx=boxes.indexOf(el);
      if(idx>0){ boxes[idx-1].value=''; boxes[idx-1].focus(); boxes[idx-1].dispatchEvent(new Event('input',{bubbles:true})); }
      return;
    }
    el.value=el.value.slice(0,-1); el.dispatchEvent(new Event('input',{bubbles:true}));
  }
  function press(k){
    if(k==='noop') return;
    if(k==='shift'){ shifted=!shifted; build(); return; }
    if(k==='mode'){ mode = mode==='symbols' ? 'qwerty' : 'symbols'; build(); return; }
    if(k==='return'){ if(activeField) activeField.blur(); hide(); return; }
    if(k==='del'){ del(); return; }
    typeChar(k);
    if(shifted){ shifted=false; build(); }
  }
  function layoutFor(el){
    if(el.classList.contains('code-box')) return 'numeric';
    const im=el.getAttribute('inputmode');
    if(im==='numeric'||im==='tel'||el.type==='tel') return 'numeric';
    return 'qwerty';
  }
  function show(el){
    if(isMobile()) return;
    activeField=el; shifted=false; mode=layoutFor(el); build();
    clearTimeout(hideT);
    requestAnimationFrame(()=> kb.classList.add('up'));
  }
  function hide(){ kb.classList.remove('up'); activeField=null; }

  app.addEventListener('focusin', e=>{
    const t=e.target;
    if(t.tagName!=='INPUT') return;
    // dismiss any iOS notification on this screen once the user taps a field
    const sc = t.closest('.screen');
    const nf = sc && sc.querySelector('.ios-notif');
    if(nf){ nf.style.animation = 'none'; nf.classList.add('gone'); }   // clear fill-mode so .gone can slide it out
    if(t.type!=='checkbox' && t.type!=='radio' && t.type!=='range'){ show(t); }
    // lift the Coach Kai sheet so its input clears the keyboard
    if(t.classList.contains('kai-field') && !isMobile()){
      const sheet = t.closest('.kai-sheet');
      if(sheet){ requestAnimationFrame(()=>{
        sheet.style.paddingBottom = (kb.offsetHeight + 8) + 'px';
        const m = sheet.querySelector('#kai-msgs'); if(m) m.scrollTop = m.scrollHeight;
      }); }
    }
  });
  app.addEventListener('focusout', (e)=>{
    if(e.target && e.target.classList && e.target.classList.contains('kai-field')){
      const sheet = e.target.closest('.kai-sheet'); if(sheet) sheet.style.paddingBottom = '';   // drop the sheet back down
    }
    clearTimeout(hideT);
    hideT=setTimeout(()=>{
      const a=document.activeElement;
      if(!(a && a.tagName==='INPUT')) hide();
    }, 120);
  });
}

/* Verification code entry: digits only, auto-advance, and unlock the gated
   "Verify and Sign In" button only once all boxes are filled. */
function initCodeInputs(){
  document.querySelectorAll('.code-boxes').forEach(group=>{
    const inputs = [...group.querySelectorAll('.code-box')];
    const screen = group.closest('.screen');
    const gateBtn = screen && screen.querySelector('.js-gate');
    const refresh = ()=>{
      const done = inputs.every(i => i.value.trim().length === 1);
      if(gateBtn) gateBtn.disabled = !done;
      if(done && document.activeElement && document.activeElement.blur) document.activeElement.blur();
    };
    inputs.forEach((inp,i)=>{
      inp.addEventListener('input', ()=>{
        inp.value = inp.value.replace(/\D/g,'').slice(0,1);
        if(inp.value && i < inputs.length-1) inputs[i+1].focus();
        refresh();
      });
      inp.addEventListener('keydown', e=>{
        if(e.key==='Backspace' && !inp.value && i>0){ inputs[i-1].focus(); }
      });
    });
    refresh();
  });
}

render();
